<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Super Colonzo World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#2a1a08;
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',monospace;
  overflow:hidden;
}
#woodFrame{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  background:
    repeating-linear-gradient(
      90deg,
      #7A4E10 0px, #9A6A20 3px, #B07828 6px, #9A6A20 9px,
      #7A4E10 12px, #C4922A 14px, #8B5E1A 18px, #7A4E10 22px
    );
  padding:14px 14px 14px 14px;
  border:5px solid #4A2A05;
  border-radius:6px;
  box-shadow:
    inset 0 0 0 3px #D4A830,
    inset 0 0 0 5px #6A4010,
    0 0 50px #000000cc,
    0 10px 40px #00000099;
}
.corner{
  position:absolute;font-size:24px;line-height:1;
  pointer-events:none;z-index:10;
  filter:drop-shadow(0 1px 3px #1a5a1a);
}
.corner.tl{top:5px;left:7px;}
.corner.tr{top:5px;right:7px;}
.corner.bl{bottom:5px;left:7px;}
.corner.br{bottom:5px;right:7px;}
#topBar{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:3px 10px;margin-bottom:8px;
  background:#1a0e04cc;border:2px solid #8A6020;border-radius:3px;
}
.topTxt{
  font-size:11px;font-weight:bold;color:#FFD700;
  text-shadow:1px 1px 0 #000,0 0 8px #AA6600;letter-spacing:1px;
}
#canvasWrap{
  border:3px solid #D4A830;
  box-shadow:inset 0 0 0 2px #7A5010,0 0 20px #D4A83066;
  line-height:0;
}
#bottomHUD{
  display:flex;gap:8px;margin-top:8px;
  align-items:center;justify-content:center;
}
</style>
</head>

    <canvas id="btn2" width="60" height="60"></canvas>
    <canvas id="btn3" width="60" height="60"></canvas>

<script>
// ── SCALE FRAME ──────────────────────────────────────────────────────────────
const woodFrame = document.getElementById('woodFrame');
function scaleGame(){
  const fw=778,fh=595;
  const s=Math.min(window.innerWidth/fw,window.innerHeight/fh,1.15);
  woodFrame.style.transform=`scale(${s})`;
  woodFrame.style.transformOrigin='center center';
}
scaleGame();
window.addEventListener('resize',scaleGame);

// ── HUD BUTTONS ──────────────────────────────────────────────────────────────
const BTN={
  blue: {face:'#2A5BBB',hi:'#4A88EE',lo:'#0A2A6A',rim:'#6AAAFF'},
  red:  {face:'#BB2A2A',hi:'#EE5A5A',lo:'#6A0A0A',rim:'#FF8888'},
  green:{face:'#2A8A2A',hi:'#5ACC5A',lo:'#0A4A0A',rim:'#88FF88'},
  dark: {face:'#2A3A5A',hi:'#4A5A7A',lo:'#0A1A3A',rim:'#8899BB'},
};
function drawBtn(id,theme,fn,lbl){
  const c=document.getElementById(id);
  if(!c)return;
  const cx=c.getContext('2d');
  cx.clearRect(0,0,60,60);
  const t=BTN[theme]||BTN.dark;
  cx.fillStyle='#00000066';cx.fillRect(3,3,57,57);
  cx.fillStyle=t.face;cx.fillRect(1,1,57,57);
  cx.fillStyle=t.hi;cx.fillRect(1,1,57,4);cx.fillRect(1,1,4,57);
  cx.fillStyle=t.lo;cx.fillRect(1,55,57,3);cx.fillRect(55,1,3,57);
  cx.fillStyle=t.face;cx.fillRect(5,5,50,50);
  cx.strokeStyle=t.rim;cx.lineWidth=1;cx.strokeRect(5,5,50,50);
  fn(cx);
  if(lbl){
    cx.fillStyle='#FFD700';cx.font='bold 8px Courier New';
    cx.textAlign='center';cx.textBaseline='bottom';
    cx.fillText(lbl,30,59);
  }
}
function refreshHUD(){
  const lives=typeof p!=='undefined'?p.lives:3;
  const shield=typeof p!=='undefined'?p.shield:0;
  const speed=typeof p!=='undefined'?p.speedBoost:0;
  const ammo=typeof p!=='undefined'?p.ammo:0;
  const gun=typeof p!=='undefined'?p.gunType:0;
  const dbl=typeof p!=='undefined'&&p.hasDoubleJump&&p.doubleJump;

  // btn0 – Lives
  drawBtn('btn0','red',cx=>{
    function heart(x,y,col){
      cx.fillStyle=col;
      [[2,0,4,3],[0,2,8,3],[0,5,8,3],[1,8,6,2],[2,10,4,2],[3,12,2,2]].forEach(([rx,ry,rw,rh])=>cx.fillRect(x+rx,y+ry,rw,rh));
    }
    for(let i=0;i<3;i++){
      heart(8+i*17,10,i<lives?'#FF3A5A':'#553344');
      if(i<lives){cx.fillStyle='#FF9AAA';cx.fillRect(10+i*17,12,3,2);}
    }
    cx.fillStyle='#FFD700';cx.font='bold 10px Courier New';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('x'+lives,30,46);
  },'LIFE');

  // btn1 – Shield
  drawBtn('btn1',shield>0?'blue':'dark',cx=>{
    const col=shield>0?'#AA88FF':'#445566';
    cx.fillStyle=col;
    [[10,8,20,3],[7,11,26,3],[6,14,28,8],[8,22,24,6],[12,28,16,4],[16,32,8,4]].forEach(([rx,ry,rw,rh])=>cx.fillRect(rx,ry,rw,rh));
    if(shield>0){
      cx.strokeStyle='#CCAAFF';cx.lineWidth=1;cx.strokeRect(10,8,20,28);
      cx.fillStyle='#333';cx.fillRect(8,42,44,6);
      cx.fillStyle='#BB88FF';cx.fillRect(8,42,44*(shield/350),6);
    }
  },'SHIELD');

  // btn2 – D-pad
  drawBtn('btn2','green',cx=>{
    cx.fillStyle='#1A5A1A';
    cx.fillRect(20,8,20,14);cx.fillRect(20,38,20,14);
    cx.fillRect(8,22,14,16);cx.fillRect(38,22,14,16);
    cx.fillStyle='#66CC44';
    cx.fillRect(22,10,16,10);cx.fillRect(22,40,16,10);
    cx.fillRect(10,24,10,12);cx.fillRect(40,24,10,12);
    cx.fillStyle='#88EE66';
    cx.fillRect(23,11,8,4);cx.fillRect(11,25,4,6);
    cx.fillStyle='#2A7A2A';cx.fillRect(22,22,16,16);
    cx.fillStyle='#44AA44';cx.fillRect(24,24,12,12);
  },'MOVE');

  // btn3 – Speed/Jump boost
  drawBtn('btn3',speed>0||dbl?'blue':'dark',cx=>{
    if(speed>0){
      cx.fillStyle='#FFEE00';
      [[18,8,14,3],[14,11,14,3],[10,14,14,3],[14,22,14,3],[18,25,14,3]].forEach(([rx,ry,rw,rh])=>cx.fillRect(rx,ry,rw,rh));
      cx.fillStyle='#333';cx.fillRect(8,42,44,5);
      cx.fillStyle='#FFCC00';cx.fillRect(8,42,44*(speed/300),5);
    } else if(dbl){
      cx.fillStyle='#00FFCC';
      cx.fillRect(22,8,16,30);cx.fillRect(12,18,36,12);
    } else {
      cx.fillStyle='#445566';
      cx.fillRect(22,10,16,30);cx.fillRect(12,18,36,12);
    }
  },speed>0?'SPEED':dbl?'JUMP':'BOOST');

  // btn4 – Gun
  drawBtn('btn4',gun>0?'red':'dark',cx=>{
    const col=gun>0?'#DDDDDD':'#556677';
    cx.fillStyle=col;
    cx.fillRect(8,22,30,12);cx.fillRect(32,16,14,12);cx.fillRect(16,34,10,10);
    cx.fillStyle=gun>0?'#AAAAAA':'#334455';cx.fillRect(10,24,26,8);
    cx.fillStyle=gun>0?'#FF4444':'#445566';cx.fillRect(36,18,8,8);
    if(gun>0){
      cx.fillStyle='#333';cx.fillRect(8,45,44,6);
      cx.fillStyle='#FF6644';cx.fillRect(8,45,Math.min(44,44*(ammo/150)),6);
      cx.fillStyle='#FFD700';cx.font='bold 9px Courier New';
      cx.textAlign='right';cx.textBaseline='top';cx.fillText(ammo,52,8);
    }
  },'GUN');
}

// ── GAME ENGINE ──────────────────────────────────────────────────────────────

ctx.imageSmoothingEnabled=false;
const GW=720,GH=420,GRAV=0.45,JUMP=-11,SPD=4;
const S={MENU:0,PLAY:1,GAMEOVER:2,WIN:3,BOSS:4};

function seededRng(seed){
  return ()=>{
    seed=Math.imul(seed^seed>>>15,1|seed);
    seed^=seed+Math.imul(seed^seed>>>7,61|seed);
    return((seed^seed>>>14)>>>0)/4294967296;
  };
}
function genPowerups(spots,seed){
  const rng=seededRng(seed),types=Object.keys(PU);
  const shuffled=[...spots].sort(()=>rng()-0.5);
  const count=2+Math.floor(rng()*2);
  return shuffled.slice(0,count).map(s=>({
    x:s.x,y:s.y,type:types[Math.floor(rng()*types.length)],collected:false
  }));
}

function loadLevel(idx){
  const base=LEVELS[idx];
  levelData={name:base.name,isBoss:base.isBoss,sky:base.sky,plats:base.plats,goal:base.goal};
  powerups=genPowerups(base.puSpots,gameReset*1000+idx*100);
  cameraX=0;initBG();resetPlayer();
  if(base.isBoss){
    boss={x:500,y:200,w:54,h:60,health:10,maxHealth:10,vx:2,vy:0,jumpTimer:60,atkTimer:40,pat:0,projs:[]};
    state=S.BOSS;
  }
  refreshHUD();
  document.getElementById('topLevel').textContent='LEVEL '+(idx+1)+'/'+LEVELS.length;
}

function resetPlayer(){
  p.x=80;p.y=levelData&&levelData.isBoss?340:280;
  p.vx=0;p.vy=0;p.onGround=false;p.facingR=true;
  p.invincible=0;p.hasDoubleJump=false;p.doubleJump=true;
  p.speedBoost=0;p.shield=0;
  if(!levelData||!levelData.isBoss){p.gunType=0;p.ammo=0;p.lives=3;}
  else{p.lives=5;p.ammo=100;}
  p.bullets=[];p.jumpAnim=0;
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function aabb(x1,y1,w1,h1,x2,y2,w2,h2){return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2;}
function spawnParts(x,y,col,n=8,spd=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=spd*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,sz:2+Math.random()*4});
  }
}
function spawnTxt(x,y,text,col='#fff'){floatTexts.push({x,y,text,col,life:1.2,vy:-1.4});}
function ptext(text,x,y,sz,col,align='left'){
  ctx.save();ctx.font=`bold ${sz}px "Courier New"`;
  ctx.textAlign=align;ctx.textBaseline='top';
  ctx.fillStyle='#00000099';ctx.fillText(text,x+2,y+2);
  ctx.fillStyle=col;ctx.fillText(text,x,y);ctx.restore();
}

// ── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBG(){
  const sky=levelData?levelData.sky:['#6AB4F0','#A8D8FF','#D0EEFF'];
  const isBoss=levelData&&levelData.isBoss;
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,sky[0]);g.addColorStop(0.5,sky[1]||sky[0]);g.addColorStop(1,sky[2]||sky[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);

  if(isBoss){
    for(let i=0;i<100;i++){
      const bx=(i*137)%GW,by=(i*79)%GH;
      ctx.globalAlpha=0.3+0.4*Math.sin(frameN*0.05+i);
      ctx.fillStyle=i%4===0?'#DD66FF':i%4===1?'#FF66CC':'#AAAAFF';
      ctx.fillRect(bx,by,2,2);
    }
    ctx.globalAlpha=1;return;
  }

  // Sun
  const sunX=GW-70,sunY=55;
  ctx.fillStyle='#FFE050';ctx.beginPath();ctx.arc(sunX,sunY,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF088';ctx.beginPath();ctx.arc(sunX,sunY,20,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.15;ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(sunX,sunY,48,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Sparkle
  ctx.fillStyle='#FFEE88';
  ctx.fillRect(sunX+34,sunY-3,12,6);ctx.fillRect(sunX+38,sunY-7,4,14);

  // Background trees
  bgTrees.forEach(tr=>{
    const tx=((tr.x-cameraX*tr.px)%2200+2200)%2200;
    if(tx>GW+80)return;
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#7A4A1A';ctx.fillRect(tx+tr.w/2-3,tr.y,7,18);
    ctx.fillStyle=tr.dark?'#1A5A1A':'#2A7A2A';
    ctx.fillRect(tx,tr.y-tr.h*0.38,tr.w,tr.h*0.5);
    ctx.fillStyle=tr.dark?'#2A7A2A':'#4AAA2A';
    ctx.fillRect(tx+4,tr.y-tr.h*0.65,tr.w-8,tr.h*0.38);
    ctx.fillStyle='#5ACC3A';ctx.fillRect(tx+8,tr.y-tr.h,tr.w-16,tr.h*0.4);
    ctx.fillStyle='#DD2233';
    ctx.fillRect(tx+tr.w*0.25,tr.y-tr.h*0.45,5,5);
    ctx.fillRect(tx+tr.w*0.6,tr.y-tr.h*0.6,4,4);
    ctx.globalAlpha=1;
  });

  // Clouds
  clouds.forEach(cl=>{
    const cx2=((cl.x-cameraX*cl.spd*0.3)%2200+2200)%2200;
    if(cx2>GW+cl.w)return;
    ctx.globalAlpha=cl.a*0.88;
    ctx.fillStyle='#FFFFFF';
    ctx.fillRect(cx2+cl.w*0.25,cl.y,cl.w*0.5,cl.h);
    ctx.fillRect(cx2+cl.w*0.1,cl.y+cl.h*0.3,cl.w*0.8,cl.h*0.7);
    ctx.fillRect(cx2,cl.y+cl.h*0.5,cl.w,cl.h*0.5);
    ctx.fillStyle='#E8F8FF';ctx.fillRect(cx2+cl.w*0.3,cl.y+cl.h*0.1,cl.w*0.18,cl.h*0.35);
    ctx.globalAlpha=1;
  });

  // Water
  waterOff=(waterOff+0.5)%32;
  const wY=370;
  const wg=ctx.createLinearGradient(0,wY,0,GH);
  wg.addColorStop(0,'#1A7AB4');wg.addColorStop(1,'#0A4A80');
  ctx.fillStyle=wg;ctx.fillRect(0,wY,GW,GH-wY);
  ctx.strokeStyle='#3A9AD4';ctx.lineWidth=2;
  for(let wy=wY+4;wy<GH;wy+=9){
    ctx.beginPath();
    for(let wx=0;wx<GW;wx+=24){
      ctx.moveTo(wx,wy+Math.sin((wx+waterOff+wy)*0.2)*2.5);
      ctx.lineTo(wx+12,wy+Math.sin((wx+waterOff+wy+12)*0.2)*2.5);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=0.25;ctx.fillStyle='#88DDFF';
  for(let si=0;si<7;si++){ctx.fillRect((waterOff*3+si*100)%GW,wY+3,18,3);}
  ctx.globalAlpha=1;
}

// ── PLATFORM ─────────────────────────────────────────────────────────────────
function drawPlat(pl){
  const px=pl.x-cameraX,py=pl.y,pw=pl.w,ph=pl.h;
  if(px+pw<-4||px>GW+4)return;
  if(pl.t==='grass'){
    ctx.fillStyle='#7A6050';ctx.fillRect(px,py+30,pw,ph-30);
    for(let gy=32;gy<ph;gy+=9){ctx.fillStyle='#9A8070';ctx.fillRect(px,py+gy,pw,2);}
    ctx.fillStyle='#3A9A2A';ctx.fillRect(px,py,pw,30);
    ctx.fillStyle='#5ACC3A';ctx.fillRect(px,py,pw,22);
    ctx.fillStyle='#7ADD4A';ctx.fillRect(px,py,pw,4);
    ctx.fillStyle='#5ACC3A';
    for(let gx=5;gx<pw;gx+=10){ctx.fillRect(px+gx,py-5,4,7);ctx.fillRect(px+gx+5,py-7,3,9);}
    ctx.fillStyle='#EE2233';for(let gx=14;gx<pw;gx+=38){ctx.fillRect(px+gx,py-4,5,5);}
    ctx.strokeStyle='#1A6A0A';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='brick'){
    ctx.fillStyle='#9A7858';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#7A5838';
    for(let ry=0;ry<ph;ry+=11){ctx.fillRect(px,py+ry,pw,2);}
    for(let ry=0;ry<ph;ry+=11){
      const off=((ry/11)|0)%2===0?0:18;
      for(let rx=off;rx<pw;rx+=36){ctx.fillRect(px+rx,py+ry,2,9);}
    }
    ctx.fillStyle='#C0A080';ctx.fillRect(px,py,pw,3);
    ctx.strokeStyle='#4A2A10';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='wood'){
    ctx.fillStyle='#C88820';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#A07010';
    for(let ry=3;ry<ph;ry+=6){ctx.fillRect(px,py+ry,pw,2);}
    ctx.fillStyle='#FFCC44';ctx.fillRect(px,py,pw,3);
    ctx.strokeStyle='#7A5000';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='stone'){
    ctx.fillStyle='#808898';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#606878';
    for(let rx=0;rx<pw;rx+=20){for(let ry=0;ry<ph;ry+=10){ctx.fillRect(px+rx+2,py+ry+2,16,7);}}
    ctx.fillStyle='#C8D8E8';ctx.fillRect(px,py,pw,3);
    ctx.strokeStyle='#404858';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='castle'){
    ctx.fillStyle='#887060';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#A08878';ctx.fillRect(px+4,py,pw-8,ph);
    for(let rx=0;rx<pw-8;rx+=18){for(let ry=0;ry<ph;ry+=12){
      ctx.fillStyle='#706050';ctx.fillRect(px+4+rx,py+ry,16,10);
      ctx.fillStyle='#B09880';ctx.fillRect(px+5+rx,py+ry,14,2);
    }}
    ctx.fillStyle='#887060';
    for(let bx2=0;bx2<pw;bx2+=13){ctx.fillRect(px+bx2,py-11,9,13);}
    const dw=16,dx2=px+pw/2-dw/2;
    ctx.fillStyle='#3A1A08';ctx.fillRect(dx2,py+ph-42,dw,42);
    ctx.fillStyle='#5A3A18';ctx.fillRect(dx2+2,py+ph-40,dw-4,40);
    ctx.fillStyle='#7A4A18';ctx.fillRect(dx2+dw/2-2,py+ph-22,4,4);
    ctx.fillStyle='#3A1A08';ctx.fillRect(px+pw/2-8,py+16,16,16);
    ctx.fillStyle='#FFAA00';ctx.fillRect(px+pw/2-6,py+18,12,12);
    ctx.fillStyle='#FFE080';ctx.fillRect(px+pw/2-4,py+19,5,5);
    ctx.fillStyle='#7A3A10';ctx.fillRect(px+4,py+ph-70,5,14);
    ctx.fillStyle='#FF8800';ctx.fillRect(px+3,py+ph-80,7,12);
    ctx.fillStyle='#FFEE00';ctx.fillRect(px+5,py+ph-82,3,8);
    ctx.fillStyle='#2A7A2A';
    for(let iy=0;iy<ph;iy+=18){ctx.fillRect(px,py+iy,5,7);}
    ctx.strokeStyle='#4A2A10';ctx.lineWidth=2;ctx.strokeRect(px,py-11,pw,ph+11);
  }
}

// ── GOAL ─────────────────────────────────────────────────────────────────────
function drawGoal(){
  if(levelData.isBoss)return;
  const g=levelData.goal;
  const gx=g.x-cameraX,gy=g.y;
  const pulse=0.65+0.35*Math.sin(frameN*0.09);
  ctx.save();
  ctx.globalAlpha=pulse*0.35;ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(gx+18,gy+10,30,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#FFD700';
  [[6,0,12,4],[2,4,20,4],[0,8,24,4],[2,12,20,4],[6,16,12,4],
   [6,0,4,20],[14,0,4,20]].forEach(([rx,ry,rw,rh])=>ctx.fillRect(gx+rx,gy+ry,rw,rh));
  ctx.fillStyle='#FFF0AA';ctx.fillRect(gx+10,gy+4,4,8);
  ctx.restore();
}

// ── POWERUP ──────────────────────────────────────────────────────────────────
function drawPowerup(pu){
  if(pu.collected)return;
  const def=PU[pu.type];
  const px=pu.x-cameraX,py=pu.y+Math.sin(frameN*0.07+pu.x*0.01)*4;
  const glow=0.5+0.5*Math.sin(frameN*0.1);
  ctx.save();
  ctx.globalAlpha=glow*0.5;ctx.fillStyle=def.glow;
  ctx.beginPath();ctx.arc(px+12,py+12,22,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#AA7722';ctx.fillRect(px,py,24,24);
  ctx.fillStyle='#CC9944';ctx.fillRect(px+2,py+2,20,10);
  ctx.fillStyle='#FFCC55';ctx.fillRect(px+2,py+2,20,4);
  ctx.fillStyle='#886611';ctx.fillRect(px+9,py+8,6,8);
  ctx.strokeStyle='#553300';ctx.lineWidth=2;ctx.strokeRect(px,py,24,24);
  ctx.fillStyle=def.col;ctx.fillRect(px+15,py+3,6,3);
  ctx.restore();
}

// ── PLAYER DRAW ──────────────────────────────────────────────────────────────
function drawPlayer(){
  const x=Math.round(p.x-cameraX),y=Math.round(p.y);
  const f=p.facingR?1:-1;
  if(p.invincible>0&&Math.floor(frameN/4)%2===0){ctx.globalAlpha=0.3;}
  const wk=p.onGround&&p.vx!==0?Math.sin(frameN*0.3)*4:0;
  const bob=p.onGround?Math.abs(Math.sin(frameN*0.3))*1.5:0;
  const ay=y+bob;
  ctx.save();
  ctx.translate(x+14,0);ctx.scale(f,1);ctx.translate(-14,0);

  // Thruster jet
  if(!p.onGround){
    ctx.globalAlpha=0.8;
    const ts=4+Math.random()*6;
    ctx.fillStyle='#FF6600';ctx.fillRect(5,ay+32,6,ts);ctx.fillRect(15,ay+32,6,ts);
    ctx.fillStyle='#FFEE00';ctx.fillRect(6,ay+32,4,ts-2);ctx.fillRect(16,ay+32,4,ts-2);
    ctx.globalAlpha=0.4;ctx.fillStyle='#FFDD00';
    ctx.beginPath();ctx.arc(8,ay+33+ts,ts*.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(18,ay+33+ts,ts*.8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Boots
  ctx.fillStyle='#884400';ctx.fillRect(3,ay+28,9,10+wk);ctx.fillRect(14,ay+28,9,10-wk);
  ctx.fillStyle='#AA6622';ctx.fillRect(2,ay+36+wk,11,6);ctx.fillRect(13,ay+36-wk,11,6);
  ctx.fillStyle='#CC8844';ctx.fillRect(2,ay+36+wk,11,3);ctx.fillRect(13,ay+36-wk,11,3);

  // Legs
  ctx.fillStyle='#1A44BB';ctx.fillRect(4,ay+27,9,6);ctx.fillRect(14,ay+27,9,6);

  // Body armor
  ctx.fillStyle='#2255CC';ctx.fillRect(4,ay+13,20,16);
  ctx.fillStyle='#3366EE';ctx.fillRect(5,ay+14,18,8);
  ctx.fillStyle='#88AAEE';ctx.fillRect(7,ay+14,14,6);
  ctx.fillStyle='#AACCFF';ctx.fillRect(8,ay+15,12,3);
  ctx.fillStyle='#AA8822';ctx.fillRect(4,ay+27,20,4);
  ctx.fillStyle='#FFCC44';ctx.fillRect(9,ay+27,6,4);

  // Arms
  const aw=wk*0.8;
  ctx.fillStyle='#2255CC';ctx.fillRect(-3,ay+14+aw,7,12);ctx.fillRect(24,ay+14-aw,7,12);
  ctx.fillStyle='#88AAEE';ctx.fillRect(-4,ay+25+aw,9,6);ctx.fillRect(23,ay+25-aw,9,6);
  ctx.fillStyle='#AACCFF';ctx.fillRect(-4,ay+25+aw,9,3);ctx.fillRect(23,ay+25-aw,9,3);

  // Gun
  if(p.gunType>0){
    ctx.fillStyle='#555';ctx.fillRect(22,ay+15,12,5);
    ctx.fillStyle='#333';ctx.fillRect(30,ay+13,6,7);
  }

  // Helmet
  ctx.fillStyle='#2255CC';ctx.fillRect(3,ay,22,14);
  ctx.fillStyle='#3366EE';ctx.fillRect(5,ay-3,18,5);
  ctx.fillStyle='#1A44BB';ctx.fillRect(7,ay-5,14,4);
  ctx.fillStyle='#FF2244';ctx.fillRect(11,ay-10,5,12);
  ctx.fillStyle='#FF6655';ctx.fillRect(11,ay-10,5,6);
  ctx.fillStyle='#AACCFF';ctx.fillRect(14,ay-14,3,8);

  // Visor
  const vc=p.shield>0?'#CC88FF':'#44CCFF';
  ctx.fillStyle=vc;ctx.fillRect(5,ay+2,18,10);
  ctx.fillStyle='#FFFFFF88';ctx.fillRect(6,ay+3,6,4);
  ctx.fillStyle=p.shield>0?'#EECCFF':'#AAEEFF';ctx.fillRect(5,ay+2,18,3);
  ctx.fillStyle='#FFFFFFAA';ctx.fillRect(7,ay+4,3,2);

  // Shield aura
  if(p.shield>0){
    ctx.globalAlpha=0.25+0.2*Math.sin(frameN*0.15);
    ctx.strokeStyle='#BB88FF';ctx.lineWidth=3;ctx.strokeRect(-7,ay-7,42,54);
    ctx.globalAlpha=0.1;ctx.fillStyle='#BB88FF';ctx.fillRect(-7,ay-7,42,54);
    ctx.globalAlpha=1;
  }

  // Speed trail
  if(p.speedBoost>0){
    for(let i=1;i<=4;i++){
      ctx.globalAlpha=0.45-i*0.09;
      ctx.fillStyle='#FFE000';ctx.fillRect(-f*i*8+14,ay+10,5,22);
    }ctx.globalAlpha=1;
  }
  ctx.restore();ctx.globalAlpha=1;
}

// ── BULLETS ──────────────────────────────────────────────────────────────────
function drawBullets(){
  p.bullets.forEach(b=>{
    const bx=b.x-cameraX;
    ctx.fillStyle=b.col;ctx.fillRect(Math.round(bx),Math.round(b.y),b.w,b.h);
    ctx.fillStyle='#FFFFFF';ctx.fillRect(Math.round(bx)+1,Math.round(b.y)+1,2,b.h-2);
  });
}

// ── BOSS DRAW ────────────────────────────────────────────────────────────────
function drawBoss(){

  ctx.fillStyle='#330855';ctx.fillRect(bx+4,by+4,boss.w-8,boss.h-8);
  for(let ry=10;ry<boss.h-4;ry+=8){ctx.fillStyle='#220644';ctx.fillRect(bx+4,by+ry,boss.w-8,2);}
  ctx.fillStyle='#880808';
  ctx.fillRect(bx+3,by-13,10,15);ctx.fillRect(bx+19,by-17,10,19);ctx.fillRect(bx+36,by-11,10,13);
  ctx.fillStyle='#FF1111';ctx.fillRect(bx+5,by-15,6,4);ctx.fillRect(bx+21,by-19,6,4);ctx.fillRect(bx+38,by-13,6,4);
  ctx.fillStyle='#FFCC00';ctx.fillRect(bx+19,by-9,16,4);
  ctx.fillStyle='#FF6600';ctx.fillRect(bx+23,by-11,4,4);ctx.fillRect(bx+29,by-11,4,4);
  const eg=0.65+0.35*Math.sin(frameN*0.12);
  ctx.globalAlpha=eg;
  ctx.fillStyle='#FF4400';ctx.fillRect(bx+8,by+12,12,10);ctx.fillRect(bx+30,by+12,12,10);
  ctx.fillStyle='#FF8800';ctx.fillRect(bx+10,by+14,8,6);ctx.fillRect(bx+32,by+14,8,6);
  ctx.fillStyle='#FFEE00';ctx.fillRect(bx+12,by+15,4,4);ctx.fillRect(bx+34,by+15,4,4);
  ctx.globalAlpha=1;
  ctx.fillStyle='#EE1111';ctx.fillRect(bx+11,by+33,30,6);
  ctx.fillStyle='#770000';
  for(let tx=0;tx<4;tx++){ctx.fillRect(bx+13+tx*7,by+33,4,4);}
  ctx.fillStyle='#110228';
  ctx.fillRect(bx-10,by+16,13,30);ctx.fillRect(bx+boss.w-3,by+16,13,30);
  ctx.fillStyle='#880808';ctx.fillRect(bx-12,by+42,8,10);ctx.fillRect(bx+boss.w+4,by+42,8,10);
  ctx.globalAlpha=0.18+0.12*Math.sin(frameN*0.08);
  ctx.fillStyle='#8800CC';
  ctx.beginPath();ctx.arc(bx+boss.w/2,by+boss.h/2,boss.w/2+16,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#FF44FF';ctx.beginPath();ctx.arc(px,pr.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFAAFF';ctx.beginPath();ctx.arc(px,pr.y,2,0,Math.PI*2);ctx.fill();

}

// ── BOSS AI ──────────────────────────────────────────────────────────────────
function updateBoss(){
  boss.jumpTimer--;boss.atkTimer--;
  const dist=Math.abs(boss.x+27-p.x-14);
  if(boss.jumpTimer<=0){boss.vy=JUMP*0.82;boss.jumpTimer=58;}
  boss.vy+=GRAV;boss.y+=boss.vy;boss.x+=boss.vx;
  if(boss.y+boss.h>=385){boss.y=385-boss.h;boss.vy=0;}
  if(boss.x<20){boss.x=20;boss.vx=Math.abs(boss.vx);}
  if(boss.x+boss.w>GW-20){boss.x=GW-boss.w-20;boss.vx=-Math.abs(boss.vx);}
  if(dist>200)boss.vx=boss.vx>0?2.5:-2.5;
  else if(dist<120)boss.vx=boss.x<p.x?-2:2;
  if(boss.atkTimer<=0){
    boss.pat=(boss.pat+1)%3;boss.atkTimer=46;
    const ang=Math.atan2(p.y-boss.y,p.x-boss.x);
    if(boss.pat===0){boss.projs.push({x:boss.x+27,y:boss.y+30,vx:Math.cos(ang)*4.5,vy:Math.sin(ang)*4.5});}
    else if(boss.pat===1){[-1,0,1].forEach(i=>boss.projs.push({x:boss.x+27,y:boss.y+30,vx:i*2.2,vy:-3.5}));}
    else{for(let i=0;i<5;i++){const a=i/5*Math.PI*2;boss.projs.push({x:boss.x+27,y:boss.y+30,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2});}}
  }
  boss.projs=boss.projs.filter(pr=>{
    pr.x+=pr.vx;pr.y+=pr.vy;pr.vy+=0.18;
    if(aabb(p.x,p.y,p.w,p.h,pr.x-7,pr.y-7,14,14)){
      if(p.shield>0){p.shield=0;spawnParts(pr.x,pr.y,'#BB88FF',12,3);spawnTxt(pr.x,pr.y-20,'BLOCKED!','#BB88FF');}
      else if(p.invincible<=0){p.lives--;p.invincible=90;spawnParts(p.x+14,p.y,'#FF3B3B',20,6);if(p.lives<=0)state=S.GAMEOVER;}
      return false;
    }
    return pr.y<GH+60&&pr.x>-60&&pr.x<GW+60;
  });
  p.bullets=p.bullets.filter(b=>{
    if(aabb(b.x,b.y,b.w,b.h,boss.x,boss.y,boss.w,boss.h)){
      boss.health--;score+=50;
      spawnParts(boss.x+27,boss.y+30,'#FF4400',14,5);
      spawnTxt(boss.x+27,boss.y-20,'HIT! +50','#FFEE00');
      if(boss.health<=0){spawnParts(boss.x+27,boss.y+30,'#FFD700',60,9);nextLevel();}
      return false;
    }
    return true;
  });
  cameraX=clamp(p.x-GW/2+20,0,200);
}

// ── FIRE GUN ─────────────────────────────────────────────────────────────────
function fireGun(){
  if(p.ammo<=0||p.gunType===0)return;
  p.ammo--;
  const bx=p.x+(p.facingR?28:-2),by=p.y+15,dx=p.facingR?1:-1;
  if(p.gunType===1){p.bullets.push({x:bx,y:by,w:10,h:5,vx:dx*8,vy:0,col:'#FFD700'});}
  else{[-1,0,1].forEach(i=>p.bullets.push({x:bx,y:by,w:9,h:4,vx:dx*6.5,vy:i*1.8,col:'#FF9933'}));}
}

// ── PLAYER PHYSICS ───────────────────────────────────────────────────────────
function updatePlayer(){
  if(state===S.BOSS)updateBoss();
  if(state!==S.PLAY&&state!==S.BOSS)return;
  const spd=SPD*(1+(p.speedBoost>0?.8:0));
  if(keys['ArrowLeft']||keys['a']||keys['A']){p.vx=-spd;p.facingR=false;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){p.vx=spd;p.facingR=true;}
  else p.vx*=0.72;
  p.vy+=GRAV;p.x+=p.vx;p.y+=p.vy;
  p.invincible=Math.max(0,p.invincible-1);
  if(p.speedBoost>0)p.speedBoost--;
  if(p.shield>0)p.shield--;
  p.bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=0.08;});
  p.bullets=p.bullets.filter(b=>b.x>cameraX-60&&b.x<cameraX+GW+60&&b.y<GH+60);

  if(state===S.PLAY){
    p.onGround=false;
    levelData.plats.forEach(pl=>{
      if(!aabb(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))return;
      if(p.vy>=0&&p.y+p.h-p.vy<=pl.y+6){
        p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.hasDoubleJump=true;
        if(pl.t==='castle'&&p.x+p.w>pl.x+8)nextLevel();
      } else if(p.vx>0&&p.x+p.w-p.vx<=pl.x+4){p.x=pl.x-p.w;p.vx=0;}
      else if(p.vx<0&&p.x-p.vx>=pl.x+pl.w-4){p.x=pl.x+pl.w;p.vx=0;}
      else if(p.vy<0)p.vy=0;
    });
    const g=levelData.goal;
    if(aabb(p.x,p.y,p.w,p.h,g.x,g.y,g.w+50,g.h+50))nextLevel();
    powerups.forEach(pu=>{if(!pu.collected&&aabb(p.x,p.y,p.w,p.h,pu.x,pu.y,24,24))collectPU(pu);});
    if(p.y>GH+60){
      if(p.shield>0){p.shield=0;p.invincible=80;p.y=200;p.vy=-8;spawnTxt(p.x,p.y-20,'SHIELD SAVED!','#BB88FF');return;}
      p.lives--;spawnParts(p.x+14,p.y,'#FF3B3B',20,6);
      if(p.lives<=0)state=S.GAMEOVER;else resetPlayer();
    }
    cameraX=clamp(p.x-GW*.28,0,3000);
  } else if(state===S.BOSS){
    if(p.y+p.h>=385){p.y=385-p.h;p.vy=0;p.onGround=true;p.hasDoubleJump=true;}
    else p.onGround=false;
    if(p.x<5){p.x=5;p.vx=0;}
    if(p.x+p.w>GW-5){p.x=GW-p.w-5;p.vx=0;}
    if(p.y>GH+60){
      if(p.shield>0){p.shield=0;p.invincible=80;p.y=340;p.vy=-8;return;}
      p.lives--;if(p.lives<=0)state=S.GAMEOVER;else resetPlayer();
    }
    powerups.forEach(pu=>{if(!pu.collected&&aabb(p.x,p.y,p.w,p.h,pu.x,pu.y,24,24))collectPU(pu);});
  }
  if(frameN%8===0)refreshHUD();
}

function collectPU(pu){
  pu.collected=true;
  const def=PU[pu.type];
  if(pu.type==='SPEED')p.speedBoost=def.dur;
  else if(pu.type==='JUMP'){p.hasDoubleJump=true;p.doubleJump=true;}
  else if(pu.type==='SHIELD')p.shield=def.dur;
  else if(pu.type==='GUN_RAPID'){p.gunType=1;p.ammo=Math.max(p.ammo,150);}
  else if(pu.type==='GUN_SPREAD'){p.gunType=2;p.ammo=Math.max(p.ammo,100);}
  else if(pu.type==='AMMO')p.ammo+=50;
  score+=100;
  spawnParts(pu.x+12,pu.y+12,def.col,16,5);
  spawnTxt(pu.x,pu.y-10,def.label,def.col);
}

function nextLevel(){
  spawnParts(p.x+14,p.y,'#FFD700',30,6);score+=500;
  currentLevel++;
  if(currentLevel>=LEVELS.length)state=S.WIN;
  else loadLevel(currentLevel);
}

// ── HUD OVERLAY ──────────────────────────────────────────────────────────────
function drawHUD(){
  const lbl=levelData.isBoss?'⚔ BOSS: '+levelData.name:'LVL '+(currentLevel+1)+'/'+LEVELS.length+' – '+levelData.name;
  ptext(lbl,GW/2,6,11,levelData.isBoss?'#FF88FF':'#FFD700','center');
  if(levelData.isBoss){
    const bw=200,bx=GW/2-100,by=22;
    ctx.fillStyle='#220033';ctx.fillRect(bx-2,by-2,bw+4,22);
    ctx.fillStyle='#440055';ctx.fillRect(bx,by,bw,18);
    const hp=boss.health/boss.maxHealth;
    ctx.fillStyle=hp>.6?'#CC00FF':hp>.3?'#FF8800':'#FF2200';
    ctx.fillRect(bx,by,bw*hp,18);
    ctx.strokeStyle='#FF88FF';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,18);
    ptext('BOSS HP: '+boss.health+'/'+boss.maxHealth,GW/2,by+20,10,'#FF88FF','center');
    ptext('AMMO: '+p.ammo,GW/2,GH-20,12,p.gunType>0?'#FFD700':'#888','center');
  }
  let row=0;
  if(p.speedBoost>0){drawMiniBar(GW-112,6+row*20,'SPD',p.speedBoost/300,'#FFCC00');row++;}
  if(p.shield>0){drawMiniBar(GW-112,6+row*20,'SHD',p.shield/350,'#BB88FF');row++;}
  if(p.hasDoubleJump&&p.doubleJump){drawMiniBar(GW-112,6+row*20,'DBL',1,'#00FFCC');row++;}
  document.getElementById('topScore').textContent='SCORE: '+score;
  document.getElementById('topLevel').textContent='LEVEL '+(currentLevel+1)+'/'+LEVELS.length;
}
function drawMiniBar(x,y,label,pct,col){
  ctx.fillStyle='#000A';ctx.fillRect(x,y,104,16);
  ctx.fillStyle=col;ctx.fillRect(x+2,y+2,100*pct,12);
  ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y,104,16);
  ptext(label,x+4,y+2,9,col,'left');
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function updateParticles(){
  particles=particles.filter(pt=>{
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life-=0.03;
    if(pt.life>0){
      ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;
      ctx.fillRect(Math.round(pt.x-cameraX),Math.round(pt.y),Math.ceil(pt.sz),Math.ceil(pt.sz));
      ctx.globalAlpha=1;
    }
    return pt.life>0;
  });
  floatTexts=floatTexts.filter(ft=>{
    ft.y+=ft.vy;ft.life-=0.018;
    if(ft.life>0){
      ctx.globalAlpha=ft.life;
      ptext(ft.text,ft.x-cameraX+14,ft.y,12,ft.col,'center');
      ctx.globalAlpha=1;
    }
    return ft.life>0;
  });
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#6AB4F0');g.addColorStop(0.55,'#A8D8FF');g.addColorStop(1,'#3A88CC');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);

  // Sun
  ctx.fillStyle='#FFE050';ctx.beginPath();ctx.arc(GW-70,55,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF088';ctx.beginPath();ctx.arc(GW-70,55,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFEE88';
  ctx.fillRect(GW-36,52,14,6);ctx.fillRect(GW-32,48,6,14);

  // Clouds
  [[80,45,130,48],[310,30,95,38],[520,60,110,42],[210,75,80,32]].forEach(([cx2,cy,cw,ch])=>{
    ctx.fillStyle='#FFFFFF';
    ctx.fillRect(cx2+cw*.25,cy,cw*.5,ch);ctx.fillRect(cx2+cw*.1,cy+ch*.3,cw*.8,ch*.7);
    ctx.fillRect(cx2,cy+ch*.5,cw,ch*.5);
    ctx.fillStyle='#E8F8FF';ctx.fillRect(cx2+cw*.3,cy+ch*.1,cw*.18,ch*.35);
  });

  // Water
  ctx.fillStyle='#1A7AB4';ctx.fillRect(0,340,GW,GH-340);
  ctx.strokeStyle='#3A9AD4';ctx.lineWidth=2;
  for(let wx=0;wx<GW;wx+=36){
    ctx.beginPath();ctx.moveTo(wx,348);ctx.lineTo(wx+18,348);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx+10,360);ctx.lineTo(wx+28,360);ctx.stroke();
  }

  // Island
  const ix=GW/2;
  ctx.fillStyle='#3A9A2A';ctx.beginPath();ctx.ellipse(ix,348,170,28,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5ACC3A';ctx.beginPath();ctx.ellipse(ix,343,158,22,0,0,Math.PI*2);ctx.fill();

  // Bushes
  [[ix-115,332,'#2A8A1A'],[ix+95,330,'#3A9A2A'],[ix-75,327,'#4AAA2A'],[ix+135,337,'#2A8A1A']].forEach(([bx,by,bc])=>{
    ctx.fillStyle=bc;ctx.beginPath();ctx.arc(bx,by,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6ACC3A';ctx.beginPath();ctx.arc(bx,by-4,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#EE2233';ctx.fillRect(bx-3,by-18,5,5);ctx.fillRect(bx+7,by-14,4,4);
  });

  // Castle
  const cax=ix-50,cay=240;
  ctx.fillStyle='#887060';ctx.fillRect(cax,cay,100,100);
  ctx.fillStyle='#A08878';ctx.fillRect(cax+8,cay+8,84,84);
  for(let ry=0;ry<100;ry+=12){
    const off=((ry/12)|0)%2===0?0:14;
    for(let rx=off;rx<84;rx+=28){
      ctx.fillStyle='#706050';ctx.fillRect(cax+8+rx,cay+ry,26,10);
      ctx.fillStyle='#B09880';ctx.fillRect(cax+9+rx,cay+ry,24,2);
    }
  }
  ctx.fillStyle='#887060';for(let b=0;b<100;b+=16){ctx.fillRect(cax+b,cay-12,10,13);}
  ctx.fillStyle='#3A1A08';ctx.fillRect(cax+36,cay+60,28,40);
  ctx.fillStyle='#5A3A18';ctx.fillRect(cax+38,cay+62,24,38);
  ctx.fillStyle='#7A4A18';ctx.fillRect(cax+47,cay+80,6,4);
  ctx.fillStyle='#3A1A08';ctx.fillRect(cax+10,cay+18,18,18);ctx.fillRect(cax+70,cay+18,18,18);
  ctx.fillStyle='#FFAA00';ctx.fillRect(cax+12,cay+20,14,14);ctx.fillRect(cax+72,cay+20,14,14);
  ctx.fillStyle='#FFE080';ctx.fillRect(cax+13,cay+21,5,5);ctx.fillRect(cax+73,cay+21,5,5);
  ctx.fillStyle='#7A3A10';ctx.fillRect(cax+28,cay+36,4,13);ctx.fillRect(cax+66,cay+36,4,13);
  ctx.fillStyle='#FF8800';ctx.fillRect(cax+26,cay+26,8,12);ctx.fillRect(cax+64,cay+26,8,12);
  ctx.fillStyle='#FFEE00';ctx.fillRect(cax+28,cay+24,4,8);ctx.fillRect(cax+66,cay+24,4,8);

  // Floating pixel heart
  const hx=GW/2-165,hy=148+Math.sin(frameN*.05)*8;
  ctx.fillStyle='#FF3A5A';
  [[6,0,8,4],[2,4,4,4],[14,4,4,4],[0,8,20,4],[0,12,20,4],[2,16,16,4],[4,20,12,4],[6,24,8,4],[8,28,4,4]].forEach(([rx,ry,rw,rh])=>ctx.fillRect(hx+rx,hy+ry,rw,rh));
  ctx.fillStyle='#FF9AAA';ctx.fillRect(hx+6,hy+2,5,3);ctx.fillRect(hx+13,hy+2,4,3);

  // Pixel star sparkle
  const sx2=GW/2+185,sy2=125+Math.sin(frameN*.04+1)*6;
  ctx.fillStyle='#FFD700';ctx.fillRect(sx2+6,sy2,6,20);ctx.fillRect(sx2,sy2+6,18,6);
  ctx.fillStyle='#FFEE88';ctx.fillRect(sx2+7,sy2+1,4,4);

  // Title box
  ctx.fillStyle='#1A0E04CC';ctx.fillRect(GW/2-210,110,420,82);
  ctx.strokeStyle='#D4A830';ctx.lineWidth=3;ctx.strokeRect(GW/2-210,110,420,82);
  ctx.strokeStyle='#7A5010';ctx.lineWidth=1;ctx.strokeRect(GW/2-206,114,412,74);

  ptext('SUPER COLONZO',GW/2,120,26,'#FFD700','center');
  ptext('WORLD  ADVENTURE',GW/2,152,17,'#FF9933','center');

  if(Math.floor(frameN/22)%2===0)ptext('[ ENTER / SPACE ]  to Start',GW/2,210,14,'#88FF44','center');
  ptext('ARROWS/WASD: Move    SPACE/W/↑: Jump',GW/2,232,10,'#AADDFF','center');
  ptext('ENTER / X: Shoot    ESC: Menu',GW/2,247,10,'#AADDFF','center');
  ptext('5 Levels + EPIC BOSS ARENA!',GW/2,264,11,'#00FFDD','center');
}

// ── GAME OVER ────────────────────────────────────────────────────────────────
function drawGameOver(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#480A0A');g.addColorStop(1,'#220505');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  for(let i=0;i<28;i++){
    ctx.fillStyle='#FF333344';
    ctx.fillRect((i*71+frameN*2)%GW,(frameN*3+i*38)%GH,4,11);
  }
  ctx.fillStyle='#380A0ACC';ctx.fillRect(GW/2-180,GH/2-65,360,110);
  ctx.strokeStyle='#FF4444';ctx.lineWidth=3;ctx.strokeRect(GW/2-180,GH/2-65,360,110);
  ptext('GAME OVER',GW/2,GH/2-44,34,'#FF3333','center');
  ptext('[ ENTER ] Return to Menu',GW/2,GH/2+22,13,'#FFAAAA','center');
}

// ── WIN ──────────────────────────────────────────────────────────────────────
function drawWin(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#1A4A1A');g.addColorStop(1,'#0A2A0A');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  for(let i=0;i<40;i++){
    ctx.fillStyle=['#FFD700','#FF6B35','#00FFDD','#7DD400','#FF3366','#88AAFF'][i%6];
    ctx.fillRect((Math.sin(frameN*.05+i*1.3)*180+GW/2+i*16)%GW,(frameN*2+i*38)%GH,8,8);
  }
  ctx.fillStyle='#0A2A0ACC';ctx.fillRect(GW/2-210,GH/2-78,420,135);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.strokeRect(GW/2-210,GH/2-78,420,135);
  ptext('YOU WIN!',GW/2,GH/2-55,34,'#FFD700','center');
  ptext('DARK OVERLORD DEFEATED!',GW/2,GH/2-15,15,'#00FFDD','center');
  ptext('SCORE: '+score,GW/2,GH/2+14,16,'#FFD700','center');
  ptext('[ ENTER ] Menu',GW/2,GH/2+42,13,'#AAFFAA','center');
}

// ── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state===S.MENU&&(e.key==='Enter'||e.key===' ')){
    gameReset++;currentLevel=0;score=0;loadLevel(0);state=S.PLAY;
  }
  if((state===S.GAMEOVER||state===S.WIN)&&e.key==='Enter'){gameReset++;state=S.MENU;}
  if(state===S.PLAY||state===S.BOSS){
    if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      if(p.onGround){p.vy=JUMP;p.onGround=false;}
      else if(p.hasDoubleJump&&p.doubleJump){p.vy=JUMP*.85;p.doubleJump=false;spawnParts(p.x+14,p.y+p.h,'#00DDFF',10,3);}
    }
    if(e.key==='Enter'||e.key==='x'||e.key==='X')fireGun();
    if(e.key==='Escape'){gameReset++;state=S.MENU;currentLevel=0;}
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,GW,GH);
  frameN++;
  if(state===S.MENU){drawMenu();}
  else if(state===S.GAMEOVER){drawGameOver();}
  else if(state===S.WIN){drawWin();}
  else{
    updatePlayer();
    drawBG();
    levelData.plats.forEach(pl=>drawPlat(pl));
    if(!levelData.isBoss){
      powerups.forEach(pu=>drawPowerup(pu));
      drawGoal();
    } else {
      drawBoss();
      powerups.forEach(pu=>drawPowerup(pu));
      drawBullets();
    }
    drawPlayer();
    updateParticles();
    drawHUD();
  }
  requestAnimationFrame(loop);
}
refreshHUD();
loop();
</script>
