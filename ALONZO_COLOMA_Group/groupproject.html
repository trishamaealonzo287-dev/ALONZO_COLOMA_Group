  woodFrame.style.transform=`scale(${s})`;woodFrame.style.transformOrigin='center center';
}

// ── HUD BUTTONS ──────────────────────────────────────────────────────────────
const BTHEMES={
  blue:{face:'#2A5BBB',hi:'#4A88EE',lo:'#0A2A6A',rim:'#6AAAFF'},
  red: {face:'#AA2222',hi:'#EE5A5A',lo:'#6A0A0A',rim:'#FF8888'},
  grn: {face:'#2A8A2A',hi:'#5ACC5A',lo:'#0A4A0A',rim:'#88FF88'},
  dark:{face:'#2A3A5A',hi:'#4A5A7A',lo:'#0A1A3A',rim:'#8899BB'},
  gold:{face:'#8A6A00',hi:'#DDAA22',lo:'#4A3A00',rim:'#FFD700'},
};
function drawBtn(id,theme,fn,lbl){
  const c=document.getElementById(id);if(!c)return;
  const cx=c.getContext('2d');cx.clearRect(0,0,58,58);
  const t=BTHEMES[theme]||BTHEMES.dark;
  cx.fillStyle='#00000066';cx.fillRect(3,3,55,55);
  cx.fillStyle=t.face;cx.fillRect(1,1,55,55);
  cx.fillStyle=t.hi;cx.fillRect(1,1,55,4);cx.fillRect(1,1,4,55);
  cx.fillStyle=t.lo;cx.fillRect(1,53,55,3);cx.fillRect(53,1,3,55);
  cx.fillStyle=t.face;cx.fillRect(5,5,48,48);
  cx.strokeStyle=t.rim;cx.lineWidth=1;cx.strokeRect(5,5,48,48);
  fn(cx);
  if(lbl){cx.fillStyle='#FFD700';cx.font='bold 8px Courier New';cx.textAlign='center';cx.textBaseline='bottom';cx.fillText(lbl,29,57);}
}

function refreshHUD(){
  const hp=typeof p!=='undefined'?p.hp:5;
  const maxHp=typeof p!=='undefined'?p.maxHp:5;
  const shield=typeof p!=='undefined'?p.shield:0;
  const speed=typeof p!=='undefined'?p.speedBoost:0;
  const ammo=typeof p!=='undefined'?p.ammo:0;
  const gun=typeof p!=='undefined'?p.gunType:0;
  const dbl=typeof p!=='undefined'&&p.hasDoubleJump&&p.doubleJump;

  // btn0 – HP hearts (5 max, shown as pixel hearts)
  drawBtn('btn0','red',cx=>{
    cx.font='bold 8px Courier New';cx.textAlign='center';
    for(let i=0;i<maxHp;i++){
      const row=Math.floor(i/3), col=i%3;
      const hx=5+col*16, hy=6+row*18;
      const full=i<hp;
      // Heart shape
      cx.fillStyle=full?'#FF2244':'#441122';
      cx.fillRect(hx+2,hy,4,2);cx.fillRect(hx+8,hy,4,2);
      cx.fillRect(hx,hy+2,14,4);
      cx.fillRect(hx+2,hy+6,10,2);
      cx.fillRect(hx+4,hy+8,6,2);
      cx.fillRect(hx+6,hy+10,2,2);
      if(full){cx.fillStyle='#FF88AA';cx.fillRect(hx+2,hy+1,3,2);}
    }
    cx.fillStyle='#FFD700';cx.font='bold 9px Courier New';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(hp+'/'+maxHp,29,50);
  },'HP');

  // btn1 – Shield
  drawBtn('btn1',shield>0?'blue':'dark',cx=>{
    const col=shield>0?'#88AAFF':'#334466';
    cx.fillStyle=col;
    // Shield shape
    cx.fillRect(10,8,30,4);cx.fillRect(7,12,36,4);cx.fillRect(6,16,36,12);
    cx.fillRect(8,28,32,6);cx.fillRect(12,34,24,4);cx.fillRect(16,38,16,4);cx.fillRect(20,42,8,4);
    if(shield>0){
      cx.strokeStyle='#CCDDFF';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(14,10);cx.lineTo(44,10);cx.lineTo(44,28);cx.lineTo(29,44);cx.lineTo(14,28);cx.closePath();cx.stroke();
      cx.fillStyle='#333';cx.fillRect(8,46,42,5);
      cx.fillStyle='#88AAFF';cx.fillRect(8,46,42*(shield/350),5);
    }
  },'SHIELD');

  // btn2 – D-pad
  drawBtn('btn2','grn',cx=>{
    cx.fillStyle='#1A5A1A';
    cx.fillRect(19,7,20,14);cx.fillRect(19,37,20,14);cx.fillRect(7,21,14,16);cx.fillRect(37,21,14,16);
    cx.fillStyle='#55BB44';
    cx.fillRect(21,9,16,10);cx.fillRect(21,39,16,10);cx.fillRect(9,23,10,12);cx.fillRect(39,23,10,12);
    cx.fillStyle='#88EE66';cx.fillRect(22,10,8,4);cx.fillRect(10,24,4,6);
    cx.fillStyle='#2A7A2A';cx.fillRect(21,21,16,16);cx.fillStyle='#44AA44';cx.fillRect(23,23,12,12);
  },'MOVE');

  // btn3 – Boost indicator
  drawBtn('btn3',speed>0?'gold':dbl?'blue':'dark',cx=>{
    if(speed>0){
      cx.fillStyle='#FFD700';
      // Lightning bolt
      cx.beginPath();cx.moveTo(32,8);cx.lineTo(20,30);cx.lineTo(28,30);cx.lineTo(22,50);cx.lineTo(40,24);cx.lineTo(32,24);cx.closePath();cx.fill();
      cx.fillStyle='#333';cx.fillRect(8,47,42,4);cx.fillStyle='#FFCC00';cx.fillRect(8,47,42*(speed/300),4);
    } else if(dbl){
      cx.fillStyle='#00FFCC';
      cx.fillRect(21,8,16,30);cx.fillRect(11,18,36,10);
      cx.fillStyle='#00CCAA';cx.fillRect(24,10,10,14);
    } else {
      cx.fillStyle='#334455';cx.fillRect(21,10,16,30);cx.fillRect(11,20,36,10);
    }
  },speed>0?'SPEED':dbl?'DBL JMP':'BOOST');

  // btn4 – Gun
  drawBtn('btn4',gun>0?'red':'dark',cx=>{
    const gc=gun>0?'#CCCCCC':'#445566';
    cx.fillStyle=gc;
    cx.fillRect(7,22,28,10);cx.fillRect(31,16,14,10);cx.fillRect(14,32,10,10);cx.fillRect(13,30,4,4);
    cx.fillStyle=gun>0?'#AAAAAA':'#334455';cx.fillRect(9,24,24,6);
    cx.fillStyle=gun>0?'#FF3333':'#334455';cx.fillRect(33,18,8,6);
    if(gun>0){
      cx.fillStyle='#111';cx.fillRect(7,44,44,5);
      cx.fillStyle='#FF5533';cx.fillRect(7,44,Math.min(44,44*(ammo/150)),5);
      cx.fillStyle='#FFD700';cx.font='bold 9px Courier New';cx.textAlign='right';cx.textBaseline='top';cx.fillText(ammo,51,7);
    }
  },'GUN');
}

function seededRng(seed){
  return ()=>{seed=Math.imul(seed^seed>>>15,1|seed);seed^=seed+Math.imul(seed^seed>>>7,61|seed);return((seed^seed>>>14)>>>0)/4294967296;};
}
function genPowerups(spots,seed){
  const rng=seededRng(seed),types=Object.keys(PU);
  const shuffled=[...spots].sort(()=>rng()-0.5);
  const count=2+Math.floor(rng()*3);
  return shuffled.slice(0,Math.min(count,shuffled.length)).map(s=>({
    x:s.x,y:s.y,type:types[Math.floor(rng()*types.length)],collected:false
  }));
}

function loadLevel(idx){
  const base=LEVELS[idx];
  levelData={name:base.name,isBoss:base.isBoss,sky:base.sky,plats:base.plats,goal:base.goal};
  powerups=genPowerups(base.puSpots,gameReset*1000+idx*100);
  // Clone obstacles
  spikes=(base.spikes||[]).map(s=>({...s}));
  movingPlats=(base.movPlats||[]).map(mp=>({...mp,dir:1}));
  enemies=(base.enemies||[]).map(e=>({...e,startX:e.x,hp:1,dead:false,deadTimer:0}));
  cameraX=0;initBG();resetPlayer();
  if(base.isBoss){
    boss={x:500,y:200,w:56,h:62,health:12,maxHealth:12,vx:2,vy:0,jumpTimer:60,atkTimer:40,pat:0,projs:[]};
    state=S.BOSS;
  }
  refreshHUD();
  document.getElementById('topLevel').textContent='LEVEL '+(idx+1)+'/'+LEVELS.length;
}

  p.invincible=0;p.hasDoubleJump=false;p.doubleJump=true;
  p.speedBoost=0;p.shield=0;
  if(!levelData||!levelData.isBoss){p.gunType=0;p.ammo=0;p.hp=5;p.maxHp=5;}
  else{p.hp=6;p.maxHp=6;p.ammo=100;}
  p.bullets=[];
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function aabb(x1,y1,w1,h1,x2,y2,w2,h2){return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2;}
function spawnParts(x,y,col,n=8,spd=3){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,sz:2+Math.random()*4});}
}
function spawnTxt(x,y,text,col='#fff'){floatTexts.push({x,y,text,col,life:1.2,vy:-1.4});}
function ptext(text,x,y,sz,col,align='left'){
  ctx.save();ctx.font=`bold ${sz}px "Courier New"`;ctx.textAlign=align;ctx.textBaseline='top';
  ctx.fillStyle='#00000099';ctx.fillText(text,x+2,y+2);ctx.fillStyle=col;ctx.fillText(text,x,y);ctx.restore();
}
function hurtPlayer(dmg=1){
  if(p.invincible>0)return;
  if(p.shield>0){p.shield=0;spawnTxt(p.x,p.y-20,'BLOCKED!','#BB88FF');return;}
  p.hp=Math.max(0,p.hp-dmg);p.invincible=90;
  spawnParts(p.x+13,p.y+10,'#FF3B3B',16,5);
  spawnTxt(p.x,p.y-18,'-'+dmg+' HP','#FF4444');
  refreshHUD();
  if(p.hp<=0)state=S.GAMEOVER;
}

// ── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBG(){
  const sky=levelData?levelData.sky:['#6AB4F0','#A8D8FF','#D0EEFF'];
  const isBoss=levelData&&levelData.isBoss;
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,sky[0]);g.addColorStop(0.5,sky[1]||sky[0]);g.addColorStop(1,sky[2]||sky[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  if(isBoss){
    for(let i=0;i<100;i++){ctx.globalAlpha=0.3+0.4*Math.sin(frameN*0.05+i);
      ctx.fillStyle=i%3===0?'#DD66FF':'#AAAAFF';ctx.fillRect((i*137)%GW,(i*79)%GH,2,2);}
    ctx.globalAlpha=1;return;
  }
  // Sun
  const sx=GW-70,sy=55;
  ctx.fillStyle='#FFE050';ctx.beginPath();ctx.arc(sx,sy,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF088';ctx.beginPath();ctx.arc(sx,sy,20,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.15;ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(sx,sy,48,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#FFEE88';ctx.fillRect(sx+34,sy-3,14,6);ctx.fillRect(sx+38,sy-7,6,14);

  bgTrees.forEach(tr=>{
    const tx=((tr.x-cameraX*tr.px)%2400+2400)%2400;if(tx>GW+80)return;
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#7A4A1A';ctx.fillRect(tx+tr.w/2-3,tr.y,7,18);
    ctx.fillStyle=tr.dark?'#1A5A1A':'#2A7A2A';ctx.fillRect(tx,tr.y-tr.h*.38,tr.w,tr.h*.5);
    ctx.fillStyle=tr.dark?'#2A7A2A':'#4AAA2A';ctx.fillRect(tx+4,tr.y-tr.h*.65,tr.w-8,tr.h*.38);
    ctx.fillStyle='#5ACC3A';ctx.fillRect(tx+8,tr.y-tr.h,tr.w-16,tr.h*.4);
    ctx.fillStyle='#DD2233';ctx.fillRect(tx+tr.w*.25,tr.y-tr.h*.45,5,5);ctx.fillRect(tx+tr.w*.6,tr.y-tr.h*.6,4,4);
    ctx.globalAlpha=1;
  });
  clouds.forEach(cl=>{
    const cx2=((cl.x-cameraX*cl.spd*.3)%2400+2400)%2400;if(cx2>GW+cl.w)return;
    ctx.globalAlpha=cl.a*.88;ctx.fillStyle='#FFFFFF';
    ctx.fillRect(cx2+cl.w*.25,cl.y,cl.w*.5,cl.h);ctx.fillRect(cx2+cl.w*.1,cl.y+cl.h*.3,cl.w*.8,cl.h*.7);
    ctx.fillRect(cx2,cl.y+cl.h*.5,cl.w,cl.h*.5);ctx.globalAlpha=1;
  });
  // Water
  waterOff=(waterOff+0.5)%32;
  const wY=370,wg=ctx.createLinearGradient(0,wY,0,GH);
  wg.addColorStop(0,'#1A7AB4');wg.addColorStop(1,'#0A4A80');
  ctx.fillStyle=wg;ctx.fillRect(0,wY,GW,GH-wY);
  ctx.strokeStyle='#3A9AD4';ctx.lineWidth=2;
  for(let wy=wY+4;wy<GH;wy+=9){
    ctx.beginPath();for(let wx=0;wx<GW;wx+=24){
      ctx.moveTo(wx,wy+Math.sin((wx+waterOff+wy)*.2)*2.5);ctx.lineTo(wx+12,wy+Math.sin((wx+waterOff+wy+12)*.2)*2.5);}
    ctx.stroke();
  }
  ctx.globalAlpha=.22;ctx.fillStyle='#88DDFF';
  for(let si=0;si<7;si++){ctx.fillRect((waterOff*3+si*100)%GW,wY+3,18,3);}ctx.globalAlpha=1;
}

// ── PLATFORM ─────────────────────────────────────────────────────────────────
function drawPlat(pl){
  const px=pl.x-cameraX,py=pl.y,pw=pl.w,ph=pl.h;
  if(px+pw<-4||px>GW+4)return;
  if(pl.t==='grass'){
    ctx.fillStyle='#7A6050';ctx.fillRect(px,py+28,pw,ph-28);
    ctx.fillStyle='#3A9A2A';ctx.fillRect(px,py,pw,28);
    ctx.fillStyle='#5ACC3A';ctx.fillRect(px,py,pw,20);
    ctx.fillStyle='#7ADD4A';ctx.fillRect(px,py,pw,4);
    ctx.fillStyle='#5ACC3A';for(let gx=5;gx<pw;gx+=10){ctx.fillRect(px+gx,py-5,4,7);ctx.fillRect(px+gx+5,py-7,3,9);}
    ctx.fillStyle='#EE2233';for(let gx=14;gx<pw;gx+=38){ctx.fillRect(px+gx,py-4,5,5);}
    ctx.strokeStyle='#1A6A0A';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='brick'){
    ctx.fillStyle='#9A7858';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#7A5838';
    for(let ry=0;ry<ph;ry+=11){ctx.fillRect(px,py+ry,pw,2);}
    for(let ry=0;ry<ph;ry+=11){const off=((ry/11)|0)%2===0?0:18;for(let rx=off;rx<pw;rx+=36){ctx.fillRect(px+rx,py+ry,2,9);}}
    ctx.fillStyle='#C0A080';ctx.fillRect(px,py,pw,3);ctx.strokeStyle='#4A2A10';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='wood'){
    ctx.fillStyle='#C88820';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#A07010';for(let ry=3;ry<ph;ry+=6){ctx.fillRect(px,py+ry,pw,2);}
    ctx.fillStyle='#FFCC44';ctx.fillRect(px,py,pw,3);ctx.strokeStyle='#7A5000';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='stone'){
    ctx.fillStyle='#808898';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#606878';for(let rx=0;rx<pw;rx+=20){for(let ry=0;ry<ph;ry+=10){ctx.fillRect(px+rx+2,py+ry+2,16,7);}}
    ctx.fillStyle='#C8D8E8';ctx.fillRect(px,py,pw,3);ctx.strokeStyle='#404858';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(pl.t==='castle'){
    ctx.fillStyle='#887060';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#A08878';ctx.fillRect(px+4,py,pw-8,ph);
    for(let rx=0;rx<pw-8;rx+=18){for(let ry=0;ry<ph;ry+=12){
      ctx.fillStyle='#706050';ctx.fillRect(px+4+rx,py+ry,16,10);ctx.fillStyle='#B09880';ctx.fillRect(px+5+rx,py+ry,14,2);}}
    ctx.fillStyle='#887060';for(let bx2=0;bx2<pw;bx2+=13){ctx.fillRect(px+bx2,py-11,9,13);}
    const dw=16,dx2=px+pw/2-dw/2;
    ctx.fillStyle='#3A1A08';ctx.fillRect(dx2,py+ph-42,dw,42);ctx.fillStyle='#5A3A18';ctx.fillRect(dx2+2,py+ph-40,dw-4,40);
    ctx.fillStyle='#3A1A08';ctx.fillRect(px+pw/2-8,py+16,16,16);ctx.fillStyle='#FFAA00';ctx.fillRect(px+pw/2-6,py+18,12,12);
    ctx.fillStyle='#7A3A10';ctx.fillRect(px+4,py+ph-70,5,14);ctx.fillStyle='#FF8800';ctx.fillRect(px+3,py+ph-80,7,12);ctx.fillStyle='#FFEE00';ctx.fillRect(px+5,py+ph-82,3,8);
    ctx.fillStyle='#2A7A2A';for(let iy=0;iy<ph;iy+=18){ctx.fillRect(px,py+iy,5,7);}
    ctx.strokeStyle='#4A2A10';ctx.lineWidth=2;ctx.strokeRect(px,py-11,pw,ph+11);
  }
}

// ── SPIKES ───────────────────────────────────────────────────────────────────
function drawSpikes(){
  spikes.forEach(sp=>{
    const sx=sp.x-cameraX;if(sx+sp.w<0||sx>GW)return;
    const count=Math.floor(sp.w/12);
    for(let i=0;i<count;i++){
      const tx=sx+i*12;
      ctx.fillStyle='#AABBCC';
      ctx.beginPath();ctx.moveTo(tx,sp.y+8);ctx.lineTo(tx+6,sp.y-2);ctx.lineTo(tx+12,sp.y+8);ctx.closePath();ctx.fill();
      ctx.fillStyle='#DDEEFF';ctx.beginPath();ctx.moveTo(tx+4,sp.y+6);ctx.lineTo(tx+6,sp.y);ctx.lineTo(tx+8,sp.y+6);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#667788';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tx,sp.y+8);ctx.lineTo(tx+6,sp.y-2);ctx.lineTo(tx+12,sp.y+8);ctx.closePath();ctx.stroke();
    }
  });
}

// ── MOVING PLATFORMS ─────────────────────────────────────────────────────────
function updateMovingPlats(){
  movingPlats.forEach(mp=>{
    mp.x+=mp.spd*mp.dir;
    if(mp.x<=mp.ax){mp.x=mp.ax;mp.dir=1;}
    if(mp.x+mp.w>=mp.bx){mp.x=mp.bx-mp.w;mp.dir=-1;}
  });
}

// ── ENEMIES ──────────────────────────────────────────────────────────────────
function updateEnemies(){
  enemies.forEach(e=>{
    if(e.dead){e.deadTimer--;return;}
    e.x+=e.spd*e.dir;
    if(e.x<=e.startX-e.range||e.x>=e.startX+e.range)e.dir*=-1;
    // Hit player
    if(aabb(p.x,p.y,p.w,p.h,e.x,e.y-20,22,20)){hurtPlayer(1);}
    // Player bullet hits enemy
    p.bullets=p.bullets.filter(b=>{
      if(!e.dead&&aabb(b.x,b.y,b.w,b.h,e.x,e.y-20,22,20)){
        e.dead=true;e.deadTimer=40;score+=100;
        spawnParts(e.x+11,e.y-10,e.type==='bat'?'#AA44FF':'#44CC44',12,4);
        spawnTxt(e.x,e.y-30,'+100','#FFD700');
        return false;
      }
      return true;
    });
  });
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead){
      if(e.deadTimer>0){
        const t=e.deadTimer/40;ctx.globalAlpha=t;
        ctx.fillStyle=e.type==='bat'?'#AA44FF':'#44CC44';
        ctx.beginPath();ctx.arc(e.x+11,e.y-10,14*t,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
      return;
    }
    const ex=e.x-cameraX,ey=e.y;
    if(ex+30<0||ex>GW)return;
    const bob=Math.sin(frameN*0.12+e.x)*2;
    if(e.type==='slime'){
      // Green slime enemy
      const sq=Math.abs(Math.sin(frameN*0.15+e.x))*3;
      ctx.fillStyle='#1A8A1A';
      ctx.beginPath();ctx.ellipse(ex+11,ey-6+sq,12,8-sq/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#33CC33';
      ctx.beginPath();ctx.ellipse(ex+11,ey-8+sq,10,6-sq/2,0,0,Math.PI*2);ctx.fill();
      // Eyes
      ctx.fillStyle='#FFFFFF';ctx.fillRect(ex+6,ey-12+sq,5,5);ctx.fillRect(ex+13,ey-12+sq,5,5);
      ctx.fillStyle='#000000';ctx.fillRect(ex+7+(e.dir>0?2:0),ey-11+sq,3,3);ctx.fillRect(ex+14+(e.dir>0?2:0),ey-11+sq,3,3);
      // Smile / frown
      ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.beginPath();
      ctx.arc(ex+11,ey-10+sq,4,0.2,Math.PI-0.2);ctx.stroke();
      // Body base
      ctx.fillStyle='#228822';ctx.fillRect(ex+2,ey-3,18,6);
    } else {
      // Bat enemy
      const flap=Math.sin(frameN*0.22+e.x)*5;
      ctx.fillStyle='#441166';
      // Wings
      ctx.beginPath();ctx.ellipse(ex+2,ey-12+bob,10,5+flap,-.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(ex+20,ey-12+bob,10,5+flap,.4,0,Math.PI*2);ctx.fill();
      // Body
      ctx.fillStyle='#662288';ctx.beginPath();ctx.ellipse(ex+11,ey-10+bob,8,7,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#884499';ctx.beginPath();ctx.ellipse(ex+11,ey-12+bob,6,5,0,0,Math.PI*2);ctx.fill();
      // Eyes
      ctx.fillStyle='#FF2244';ctx.fillRect(ex+6,ey-14+bob,4,4);ctx.fillRect(ex+13,ey-14+bob,4,4);
      ctx.fillStyle='#FF8800';ctx.fillRect(ex+7,ey-13+bob,2,2);ctx.fillRect(ex+14,ey-13+bob,2,2);
      // Fangs
      ctx.fillStyle='#FFFFFF';ctx.fillRect(ex+8,ey-6+bob,3,4);ctx.fillRect(ex+12,ey-6+bob,3,4);
    }
  });
}

// ── ADVENTURER CHARACTER DRAW ─────────────────────────────────────────────────
function drawPlayer(){
  const x=Math.round(p.x-cameraX),y=Math.round(p.y);
  const f=p.facingR?1:-1;
  if(p.invincible>0&&Math.floor(frameN/4)%2===0){ctx.globalAlpha=0.3;}
  const wk=p.onGround&&Math.abs(p.vx)>.5?Math.sin(frameN*0.28)*4:0;
  const bob=p.onGround?Math.abs(Math.sin(frameN*0.28))*1.5:0;
  const ay=Math.round(y+bob);

  ctx.save();
  ctx.translate(x+13,0);ctx.scale(f,1);ctx.translate(-13,0);

  // ── Jump dust / landing
  if(!p.onGround){
    // Boot flame puffs
    ctx.globalAlpha=0.7;
    const ts=3+Math.random()*5;
    ctx.fillStyle='#AA5500';ctx.fillRect(4,ay+33,5,ts);ctx.fillRect(13,ay+33,5,ts);
    ctx.fillStyle='#FFAA00';ctx.fillRect(5,ay+33,3,ts-2);ctx.fillRect(14,ay+33,3,ts-2);
    ctx.globalAlpha=1;
  }

  // ── Boots (brown leather)
  ctx.fillStyle='#6B3A10';ctx.fillRect(2,ay+28,10,10+wk);ctx.fillRect(14,ay+28,10,10-wk);
  ctx.fillStyle='#8B5A28';ctx.fillRect(1,ay+36+wk,12,6);ctx.fillRect(13,ay+36-wk,12,6);
  // Boot strap
  ctx.fillStyle='#FFCC55';ctx.fillRect(2,ay+32+wk,10,2);ctx.fillRect(14,ay+32-wk,10,2);
  ctx.fillStyle='#AA8830';ctx.fillRect(1,ay+36+wk,12,3);ctx.fillRect(13,ay+36-wk,12,3);

  // ── Pants (dark brown leather)
  ctx.fillStyle='#5A3A18';ctx.fillRect(3,ay+22,10,10+wk*.5);ctx.fillRect(13,ay+22,10,10-wk*.5);
  ctx.fillStyle='#7A5530';ctx.fillRect(4,ay+23,8,6+wk*.3);ctx.fillRect(14,ay+23,8,6-wk*.3);

  // ── Belt
  ctx.fillStyle='#7A4A10';ctx.fillRect(2,ay+20,22,5);
  ctx.fillStyle='#FFCC00';ctx.fillRect(10,ay+20,6,5);// buckle
  ctx.fillStyle='#FFD700';ctx.fillRect(11,ay+21,4,3);
  // Pouches on belt
  ctx.fillStyle='#8B5A20';ctx.fillRect(2,ay+20,6,7);ctx.fillRect(18,ay+20,6,7);
  ctx.fillStyle='#FFCC55';ctx.fillRect(3,ay+21,4,2);ctx.fillRect(19,ay+21,4,2);

  // ── Tunic body (warm brown/green adventurer color)
  ctx.fillStyle='#4A7A30';ctx.fillRect(3,ay+10,20,13);
  ctx.fillStyle='#5A9A40';ctx.fillRect(4,ay+11,18,8);
  // Tunic chest trim (leather lacing)
  ctx.fillStyle='#8B5A20';ctx.fillRect(11,ay+10,4,12);
  ctx.fillStyle='#FFCC55';ctx.fillRect(12,ay+11,2,10);
  // Shoulder pads (leather)
  ctx.fillStyle='#8B5A20';ctx.fillRect(2,ay+10,6,8);ctx.fillRect(18,ay+10,6,8);
  ctx.fillStyle='#AA7730';ctx.fillRect(3,ay+10,4,4);ctx.fillRect(19,ay+10,4,4);

  // ── Arms
  const aw=wk*0.7;
  // Upper arm
  ctx.fillStyle='#4A7A30';ctx.fillRect(-4,ay+11+aw,7,11);ctx.fillRect(23,ay+11-aw,7,11);
  // Forearm / wrist wrap
  ctx.fillStyle='#8B5A20';ctx.fillRect(-5,ay+21+aw,8,6);ctx.fillRect(23,ay+21-aw,8,6);
  ctx.fillStyle='#C4922A';ctx.fillRect(-4,ay+21+aw,6,3);ctx.fillRect(24,ay+21-aw,6,3);
  // Gloves
  ctx.fillStyle='#6B3A10';ctx.fillRect(-5,ay+26+aw,8,5);ctx.fillRect(23,ay+26-aw,8,5);

  // ── Sword/staff if no gun, gun if equipped
  if(p.gunType===0){
    // Sword at right hip (always visible)
    ctx.fillStyle='#888888';ctx.fillRect(22,ay+14,3,16);
    ctx.fillStyle='#AAAAAA';ctx.fillRect(22,ay+14,3,10);
    ctx.fillStyle='#FFCC00';ctx.fillRect(20,ay+17,7,3);// crossguard
    ctx.fillStyle='#8B5A20';ctx.fillRect(22,ay+20,3,10);// grip
  } else {
    ctx.fillStyle='#555';ctx.fillRect(22,ay+13,13,5);
    ctx.fillStyle='#333';ctx.fillRect(31,ay+11,6,7);
    ctx.fillStyle='#888';ctx.fillRect(33,ay+11,3,3);
  }

  // ── Head (skin)
  ctx.fillStyle='#E8B888';ctx.fillRect(4,ay+1,18,12);
  ctx.fillStyle='#D4A070';ctx.fillRect(4,ay+10,18,3);// chin shadow
  // Nose
  ctx.fillStyle='#D09060';ctx.fillRect(11,ay+6,4,3);
  // Eyes
  ctx.fillStyle='#2A1A0A';ctx.fillRect(6,ay+3,4,4);ctx.fillRect(16,ay+3,4,4);
  ctx.fillStyle='#4A3ACA';ctx.fillRect(7,ay+4,2,2);ctx.fillRect(17,ay+4,2,2);// pupils
  ctx.fillStyle='#FFFFFF';ctx.fillRect(6,ay+3,2,2);ctx.fillRect(16,ay+3,2,2);// glint
  // Eyebrows
  ctx.fillStyle='#6B3A10';ctx.fillRect(5,ay+2,5,2);ctx.fillRect(15,ay+2,5,2);
  // Mouth (smile or grim depending on HP)
  ctx.fillStyle='#8B4A30';
  if(p.hp>2){ctx.fillRect(8,ay+10,2,2);ctx.fillRect(14,ay+10,2,2);ctx.fillRect(10,ay+11,6,2);}
  else{ctx.fillRect(8,ay+11,10,2);}

  // ── Hat / Hood (adventurer wide-brim hat)
  ctx.fillStyle='#5A3A10';// brim
  ctx.fillRect(0,ay-1,26,4);
  ctx.fillStyle='#7A5A20';ctx.fillRect(1,ay-1,24,3);
  ctx.fillStyle='#6A4A18';// crown
  ctx.fillRect(4,ay-9,18,10);
  ctx.fillStyle='#8A6A30';ctx.fillRect(5,ay-8,16,6);
  // Hat band
  ctx.fillStyle='#CC3333';ctx.fillRect(4,ay-2,18,3);
  ctx.fillStyle='#EE5544';ctx.fillRect(5,ay-2,12,2);
  // Feather in hat
  ctx.fillStyle='#EEFF44';ctx.fillRect(18,ay-14,4,12);
  ctx.fillStyle='#CCDD22';ctx.fillRect(19,ay-14,2,8);
  ctx.fillStyle='#EEFF44';ctx.fillRect(20,ay-16,2,5);

  // ── Cape (flowing)
  if(Math.abs(p.vx)>.5||!p.onGround){
    const capeFlap=Math.sin(frameN*.2+Math.abs(p.vx)*.5)*4;
    ctx.fillStyle='#CC2222';
    ctx.beginPath();ctx.moveTo(3,ay+10);ctx.lineTo(-2,ay+26+capeFlap);
    ctx.lineTo(2,ay+28+capeFlap);ctx.lineTo(5,ay+12);ctx.closePath();ctx.fill();
    ctx.fillStyle='#FF4444';ctx.fillRect(3,ay+10,2,8);
  } else {
    ctx.fillStyle='#CC2222';ctx.fillRect(1,ay+10,5,20);
    ctx.fillStyle='#FF4444';ctx.fillRect(2,ay+10,3,14);
  }

  // ── Shield aura
  if(p.shield>0){
    ctx.globalAlpha=0.25+0.2*Math.sin(frameN*.15);
    ctx.strokeStyle='#BB88FF';ctx.lineWidth=3;ctx.strokeRect(-8,ay-10,42,58);
    ctx.globalAlpha=0.1;ctx.fillStyle='#BB88FF';ctx.fillRect(-8,ay-10,42,58);ctx.globalAlpha=1;
  }
  // ── Speed trail
  if(p.speedBoost>0){
    for(let i=1;i<=4;i++){ctx.globalAlpha=0.4-i*.08;ctx.fillStyle='#FFE000';ctx.fillRect(-f*i*8+13,ay+8,5,24);}
    ctx.globalAlpha=1;
  }
  ctx.restore();ctx.globalAlpha=1;
}

// ── BOSS AI ──────────────────────────────────────────────────────────────────
function updateBoss(){
  boss.jumpTimer--;boss.atkTimer--;
  const dist=Math.abs(boss.x+28-p.x-13);
  if(boss.jumpTimer<=0){boss.vy=JUMP*.8;boss.jumpTimer=55;}
  boss.vy+=GRAV;boss.y+=boss.vy;boss.x+=boss.vx;
  if(boss.y+boss.h>=385){boss.y=385-boss.h;boss.vy=0;}
  if(boss.x<20){boss.x=20;boss.vx=Math.abs(boss.vx);}
  if(boss.x+boss.w>GW-20){boss.x=GW-boss.w-20;boss.vx=-Math.abs(boss.vx);}
  if(dist>200)boss.vx=boss.vx>0?2.6:-2.6;
  else if(dist<120)boss.vx=boss.x<p.x?-2:2;
  if(boss.atkTimer<=0){
    boss.pat=(boss.pat+1)%3;boss.atkTimer=44;
    const ang=Math.atan2(p.y-boss.y,p.x-boss.x);
    if(boss.pat===0){boss.projs.push({x:boss.x+28,y:boss.y+30,vx:Math.cos(ang)*4.5,vy:Math.sin(ang)*4.5});}
    else if(boss.pat===1){[-1,0,1].forEach(i=>boss.projs.push({x:boss.x+28,y:boss.y+30,vx:i*2.2,vy:-3.5}));}
    else{for(let i=0;i<5;i++){const a=i/5*Math.PI*2;boss.projs.push({x:boss.x+28,y:boss.y+30,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2});}}
  }
  boss.projs=boss.projs.filter(pr=>{
    pr.x+=pr.vx;pr.y+=pr.vy;pr.vy+=0.18;
    if(aabb(p.x,p.y,p.w,p.h,pr.x-7,pr.y-7,14,14)){hurtPlayer(1);return false;}
    return pr.y<GH+60&&pr.x>-60&&pr.x<GW+60;
  });
  p.bullets=p.bullets.filter(b=>{
    if(aabb(b.x,b.y,b.w,b.h,boss.x,boss.y,boss.w,boss.h)){
      boss.health--;score+=50;
      spawnParts(boss.x+28,boss.y+30,'#FF4400',14,5);
      spawnTxt(boss.x+28,boss.y-20,'HIT! +50','#FFEE00');
      if(boss.health<=0){spawnParts(boss.x+28,boss.y+30,'#FFD700',60,9);nextLevel();}
      return false;
    }
    return true;
  });
  cameraX=clamp(p.x-GW/2+20,0,200);
}

// ── FIRE GUN ─────────────────────────────────────────────────────────────────
function fireGun(){
  if(p.ammo<=0||p.gunType===0)return;
  p.ammo--;
  const bx=p.x+(p.facingR?28:-2),by=p.y+14,dx=p.facingR?1:-1;
  if(p.gunType===1){p.bullets.push({x:bx,y:by,w:10,h:5,vx:dx*8,vy:0,col:'#FFD700'});}
  else{[-1,0,1].forEach(i=>p.bullets.push({x:bx,y:by,w:9,h:4,vx:dx*6.5,vy:i*1.8,col:'#FF9933'}));}
}

// ── PHYSICS ──────────────────────────────────────────────────────────────────
function resolvePlayerPlatforms(platList){
  platList.forEach(pl=>{
    if(!aabb(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))return;
    if(p.vy>=0&&p.y+p.h-p.vy<=pl.y+6){
      p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.hasDoubleJump=true;
      if(pl.t==='castle'&&p.x+p.w>pl.x+8)nextLevel();
    } else if(p.vx>0&&p.x+p.w-p.vx<=pl.x+4){p.x=pl.x-p.w;p.vx=0;}
    else if(p.vx<0&&p.x-p.vx>=pl.x+pl.w-4){p.x=pl.x+pl.w;p.vx=0;}
    else if(p.vy<0)p.vy=0;
  });
}

function updatePlayer(){
  if(state===S.BOSS)updateBoss();
  if(state!==S.PLAY&&state!==S.BOSS)return;
  const spd=SPD*(1+(p.speedBoost>0?.85:0));
  if(keys['ArrowLeft']||keys['a']||keys['A']){p.vx=-spd;p.facingR=false;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){p.vx=spd;p.facingR=true;}
  else p.vx*=0.72;
  p.vy+=GRAV;p.x+=p.vx;p.y+=p.vy;
  p.invincible=Math.max(0,p.invincible-1);
  if(p.speedBoost>0)p.speedBoost--;
  if(p.shield>0)p.shield--;
  p.bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=0.08;});
  p.bullets=p.bullets.filter(b=>b.x>cameraX-60&&b.x<cameraX+GW+60&&b.y<GH+60);

  if(state===S.PLAY){
    p.onGround=false;
    updateMovingPlats();
    updateEnemies();
    resolvePlayerPlatforms(levelData.plats);
    resolvePlayerPlatforms(movingPlats);

    // Moving platform carry
    movingPlats.forEach(mp=>{
      if(p.onGround&&aabb(p.x,p.y+p.h-2,p.w,4,mp.x,mp.y,mp.w,mp.h)){
        p.x+=mp.spd*mp.dir;
      }
    });

    // Spikes
    spikes.forEach(sp=>{
      if(aabb(p.x,p.y,p.w,p.h,sp.x,sp.y-8,sp.w,10)){hurtPlayer(1);}
    });

    // Goal
    const g=levelData.goal;
    if(aabb(p.x,p.y,p.w,p.h,g.x,g.y,g.w+50,g.h+50))nextLevel();

    // Powerups
    powerups.forEach(pu=>{if(!pu.collected&&aabb(p.x,p.y,p.w,p.h,pu.x,pu.y,24,24))collectPU(pu);});

    // Fall
    if(p.y>GH+60){
      if(p.shield>0){p.shield=0;p.invincible=80;p.y=180;p.vy=-8;spawnTxt(p.x,p.y-20,'SHIELD SAVED!','#BB88FF');return;}
      hurtPlayer(2);if(state!==S.GAMEOVER){p.x=80;p.y=260;p.vx=0;p.vy=0;}
    }
    cameraX=clamp(p.x-GW*.28,0,3000);

  } else if(state===S.BOSS){
    if(p.y+p.h>=385){p.y=385-p.h;p.vy=0;p.onGround=true;p.hasDoubleJump=true;}
    else p.onGround=false;
    if(p.x<5){p.x=5;p.vx=0;}if(p.x+p.w>GW-5){p.x=GW-p.w-5;p.vx=0;}
    if(p.y>GH+60){hurtPlayer(2);if(state!==S.GAMEOVER){p.y=330;p.vy=-6;}}
    powerups.forEach(pu=>{if(!pu.collected&&aabb(p.x,p.y,p.w,p.h,pu.x,pu.y,24,24))collectPU(pu);});
  }
  if(frameN%8===0)refreshHUD();
}

function collectPU(pu){
  pu.collected=true;const def=PU[pu.type];
  if(pu.type==='SPEED')p.speedBoost=def.dur;
  else if(pu.type==='JUMP'){p.hasDoubleJump=true;p.doubleJump=true;}
  else if(pu.type==='SHIELD')p.shield=def.dur;
  else if(pu.type==='GUN_RAPID'){p.gunType=1;p.ammo=Math.max(p.ammo,150);}
  else if(pu.type==='GUN_SPREAD'){p.gunType=2;p.ammo=Math.max(p.ammo,100);}
  else if(pu.type==='AMMO')p.ammo+=50;
  else if(pu.type==='HEAL'){p.hp=Math.min(p.maxHp,p.hp+2);refreshHUD();}
  score+=100;
  spawnParts(pu.x+12,pu.y+12,def.col,16,5);
  spawnTxt(pu.x,pu.y-10,def.label,def.col);
}

function nextLevel(){
  spawnParts(p.x+13,p.y,'#FFD700',30,6);score+=500;currentLevel++;
  if(currentLevel>=LEVELS.length)state=S.WIN;else loadLevel(currentLevel);
}

function updateParticles(){

    if(pt.life>0){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;
      ctx.fillRect(Math.round(pt.x-cameraX),Math.round(pt.y),Math.ceil(pt.sz),Math.ceil(pt.sz));ctx.globalAlpha=1;}

  ptext('YOU WIN!',GW/2,GH/2-55,34,'#FFD700','center');
  ptext('DARK OVERLORD DEFEATED!',GW/2,GH/2-15,15,'#00FFDD','center');
  ptext('SCORE: '+score,GW/2,GH/2+14,16,'#FFD700','center');
  ptext('[ ENTER ] Menu',GW/2,GH/2+42,13,'#AAFFAA','center');
}

// ── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state===S.MENU&&(e.key==='Enter'||e.key===' ')){
    gameReset++;currentLevel=0;score=0;loadLevel(0);state=S.PLAY;
  }
  if((state===S.GAMEOVER||state===S.WIN)&&e.key==='Enter'){gameReset++;state=S.MENU;}
  if(state===S.PLAY||state===S.BOSS){
    if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      if(p.onGround){p.vy=JUMP;p.onGround=false;}
      else if(p.hasDoubleJump&&p.doubleJump){p.vy=JUMP*.85;p.doubleJump=false;spawnParts(p.x+13,p.y+p.h,'#00DDFF',10,3);}
    }
    if(e.key==='Enter'||e.key==='x'||e.key==='X')fireGun();
    if(e.key==='Escape'){gameReset++;state=S.MENU;currentLevel=0;}
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,GW,GH);
  frameN++;
  if(state===S.MENU){drawMenu();}
  else if(state===S.GAMEOVER){drawGameOver();}
  else if(state===S.WIN){drawWin();}
  else{
    updatePlayer();
    drawBG();
    levelData.plats.forEach(pl=>drawPlat(pl));
    movingPlats.forEach(mp=>drawPlat(mp));
    drawSpikes();
    if(!levelData.isBoss){
      powerups.forEach(pu=>drawPowerup(pu));
      drawEnemies();
      drawGoal();
    } else {
      drawBoss();
      powerups.forEach(pu=>drawPowerup(pu));
      drawBullets();
    }
    drawBullets();
    drawPlayer();
    updateParticles();
    drawHUD();
  }
  requestAnimationFrame(loop);
}
refreshHUD();
loop();
</script>
