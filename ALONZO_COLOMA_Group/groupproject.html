// ---- FULLSCREEN CANVAS SETUP ----
function setupCanvas(){
  const canvas=document.getElementById('c');
  const gameW=800;
  const gameH=560;
  
  const windowW=window.innerWidth;
  const windowH=window.innerHeight;
  
  const scaleX=windowW/gameW;
  const scaleY=windowH/gameH;
  const scale=Math.min(scaleX,scaleY);
  
  canvas.width=gameW;
  canvas.height=gameH;
  
  return {scale,gameW,gameH,windowW,windowH};
}

let canvasInfo=setupCanvas();
window.addEventListener('resize',()=>{
  canvasInfo=setupCanvas();
});

// ---- UTILITY: RANDOMIZE POWERUPS WITH SEED ----
function generateRandomPowerups(spots, seed){
  let powerupTypes=['SPEED','JUMP','SHIELD'];
  let generated=[];
  
  let rng=function(s){
    let x=Math.sin(s++)*10000;
    return x-Math.floor(x);
  };
  
  let shuffledSpots=[...spots];
  for(let i=shuffledSpots.length-1;i>0;i--){
    let j=Math.floor(rng(seed+i)*(i+1));
    [shuffledSpots[i],shuffledSpots[j]]=[shuffledSpots[j],shuffledSpots[i]];
  }
  
  let count=2+Math.floor(rng(seed+1000)*3);
  count=Math.min(count,shuffledSpots.length);
  
  for(let i=0;i<count;i++){
    let spot=shuffledSpots[i];
    let typeIdx=Math.floor(rng(seed+i*100)*powerupTypes.length);
    let type=powerupTypes[typeIdx];
    
    let offsetX=(rng(seed+i*200)-0.5)*40;
    let offsetY=(rng(seed+i*300)-0.5)*40;
    
    generated.push({
      x:spot.x+offsetX,
      y:spot.y+offsetY,
      type:type,
      collected:false
    });
  }
  
  return generated;
}

// ---- BACKGROUND ELEMENTS INIT ----
function initBackgroundElements(){
  // Enhanced stars
  stars=[];
  for(let i=0;i<150;i++){
    stars.push({
      x:Math.random()*2400,
      y:Math.random()*350,
      size:Math.random()*2.5+0.5,
      twinkle:Math.random()*Math.PI*2,
      speed:Math.random()*0.4+0.05,
      brightness:Math.random()*0.8+0.4,
      depth:Math.random()*0.8+0.2,
      color:['#ffffff','#ffff99','#ccffff'][Math.floor(Math.random()*3)]
    });
  }

  // Better clouds
  bgClouds=[];
  for(let i=0;i<18;i++){
    bgClouds.push({
      x:Math.random()*2400,
      y:30+Math.random()*200,
      w:60+Math.random()*150,
      h:30+Math.random()*40,
      speed:0.15+Math.random()*0.5,
      color:`rgba(240,248,255,${0.2+Math.random()*0.15})`,
      density:Math.random()*0.6+0.3,
      depth:Math.random()
    });
  }

  // Floating islands
  bgIslands=[];
  for(let i=0;i<8;i++){
    bgIslands.push({
      x:i*300+100,
      y:180+Math.sin(i*0.5)*40,
      w:70+Math.random()*80,
      h:40+Math.random()*30,
      color:`hsl(${220+Math.random()*20},70%,50%)`,
      shadowColor:`rgba(20,30,80,0.5)`,
      parallax:0.15+Math.random()*0.15,
      tilt:Math.random()*0.3-0.15
    });
  }

  nebulas=[];
  nebulas.push({x:150,y:120,r:100,color:'#7c52a6',alpha:0.12});
  nebulas.push({x:900,y:80,r:120,color:'#ff6b35',alpha:0.1});
  nebulas.push({x:600,y:200,r:90,color:'#4a90e2',alpha:0.08});

  mountainSeed=frameCount;
  distantMountains=[];
  for(let i=0;i<12;i++){
    let seed=mountainSeed+i*12345;
    let peaks=2+((seed*73)%2);
    let mountainColor=['#7c52a6','#4a90e2','#2d8659'][i%3];
    distantMountains.push({
      x:i*200-100,
      y:280+Math.sin(i*0.3)*20,
      h:120+(((seed*97)%60)),
      w:180,
      slope:0.3+((seed*53)%40)*0.01,
      color:`${mountainColor}99`,
      parallax:0.08+((seed*29)%5)*0.01,
      peaks:peaks,
      peakOffsets:Array.from({length:peaks+1},((_,j)=>((seed+j*999)*67)%20-10))
    });
  }
}

// ---- UTILS ----
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function rect(x1,y1,w1,h1,x2,y2,w2,h2){
  return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2;
}

// ---- PARTICLES ----
function spawnParticles(x,y,color,count=8,speed=3){
  for(let i=0;i<count;i++){
    let angle=Math.random()*Math.PI*2;
    let s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(angle)*s,vy:Math.sin(angle)*s-1,life:1,maxLife:1,color,size:3+Math.random()*4});
  }
}
function spawnText(x,y,text,color='#fff'){
  floatingTexts.push({x,y,text,color,life:1.2,vy:-1.5});
}

// ---- PIXEL FONT DRAW ----
function drawPixelText(text,x,y,size=16,color='#fff',align='left'){
  ctx.save();
  ctx.font=`${size}px "Courier New"`;
  ctx.fillStyle=color;
  ctx.textAlign=align;
  ctx.textBaseline='top';
  ctx.fillStyle='#00000088';
  ctx.fillText(text,x+2,y+2);
  ctx.fillStyle=color;
  ctx.fillText(text,x,y);
  ctx.restore();
}

// ---- LOAD LEVEL ----
function loadLevel(idx){
  let base=LEVEL_BASES[idx];
  levelData={
    bg:base.bg,
    platforms:base.platforms,
    goal:base.goal
  };
  powerupsInLevel=generateRandomPowerups(base.powerupSpots, gameResetCount*1000+currentLevel*100);
  resetPlayer();
  cameraX=0;
  initBackgroundElements();
}

function resetPlayer(){
  p.x=80;p.y=300;p.vx=0;p.vy=0;
  p.onGround=false;p.facingR=true;
  p.invincible=0;p.doubleJump=true;p.hasDoubleJump=false;
  p.speedBoost=0;p.shield=0;p.powerup=null;
  p.animFrame=0;p.jumpAnim=0;
}

// ---- ENHANCED BACKGROUND ----
function drawBackground(){
  let bgConfig=levelData?levelData.bg:{type:'sunset',skyTop:'#1f3a7d',skyMid:'#2a5fa8',skyBot:'#7c52a6',sunColor:'#ffa500'};
  
  // Beautiful gradient sky
  let grd=ctx.createLinearGradient(0,0,0,GAME_H);
  grd.addColorStop(0,bgConfig.skyTop);
  grd.addColorStop(0.4,bgConfig.skyMid);
  grd.addColorStop(1,bgConfig.skyBot);
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,GAME_W,GAME_H);

  // Big sun with glow
  let sunY=120+Math.sin(frameCount*0.005)*20;
  ctx.globalAlpha=0.3;
  ctx.fillStyle=bgConfig.sunColor;
  ctx.beginPath();
  ctx.arc(GAME_W-100,sunY,90,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=0.5;
  ctx.beginPath();
  ctx.arc(GAME_W-100,sunY,70,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=bgConfig.sunColor;
  ctx.beginPath();
  ctx.arc(GAME_W-100,sunY,50,0,Math.PI*2);
  ctx.fill();

  // Nebula effects
  nebulas.forEach(neb=>{
    ctx.globalAlpha=neb.alpha;
    let grd2=ctx.createRadialGradient(neb.x,neb.y,10,neb.x,neb.y,neb.r);
    grd2.addColorStop(0,'#ffffff44');
    grd2.addColorStop(0.5,neb.color);
    grd2.addColorStop(1,'transparent');
    ctx.fillStyle=grd2;
    ctx.beginPath();
    ctx.arc(neb.x,neb.y,neb.r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;

  // Mountains
  distantMountains.forEach(mt=>{
    let mx=((mt.x-cameraX*mt.parallax)%2400+2400)%2400;
    if(mx>GAME_W+mt.w)mx-=2400;
    
    ctx.fillStyle=mt.color;
    ctx.beginPath();
    ctx.moveTo(mx,mt.y+mt.h);
    for(let i=0;i<=mt.peaks;i++){
      let px=mx+(mt.w/mt.peaks)*i;
      let py=mt.y+mt.peakOffsets[i]*mt.h*0.01;
      ctx.lineTo(px,py);
    }
    ctx.lineTo(mx+mt.w,mt.y+mt.h);
    ctx.closePath();
    ctx.fill();
    
    // Snow caps
    ctx.fillStyle='#f0f8ff99';
    ctx.beginPath();
    ctx.moveTo(mx,mt.y+mt.h);
    for(let i=0;i<=mt.peaks;i++){
      let px=mx+(mt.w/mt.peaks)*i;
      let py=mt.y+mt.peakOffsets[i]*mt.h*0.01;
      ctx.lineTo(px,py);
    }
    ctx.lineTo(mx+mt.w*0.85,mt.y+mt.h*0.2);
    ctx.closePath();
    ctx.fill();
  });

  // Islands
  bgIslands.forEach(isl=>{
    let ix=((isl.x-cameraX*isl.parallax)%2400+2400)%2400;
    
    ctx.globalAlpha=0.5;
    ctx.fillStyle=isl.shadowColor;
    ctx.beginPath();
    ctx.ellipse(ix+isl.w/2,isl.y+isl.h+8,isl.w*0.5,4,isl.tilt,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    
    let igrd=ctx.createLinearGradient(ix,isl.y,ix,isl.y+isl.h);
    igrd.addColorStop(0,isl.color);
    igrd.addColorStop(1,isl.color.replace('50%','35%'));
    ctx.fillStyle=igrd;
    
    ctx.save();
    ctx.translate(ix+isl.w/2,isl.y);
    ctx.rotate(isl.tilt);
    ctx.beginPath();
    ctx.ellipse(0,0,isl.w*0.5,isl.h*0.4,0,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.ellipse(-isl.w*0.15,-isl.h*0.15,isl.w*0.2,isl.h*0.15,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha=1;
  });

  // Stars
  stars.forEach(s=>{
    let blink=0.3+0.7*Math.sin(s.twinkle+frameCount*s.speed*0.04);
    ctx.globalAlpha=blink*s.brightness;
    ctx.fillStyle=s.color;
    let sx=((s.x-cameraX*s.speed*0.1)%2400+2400)%2400;
    let sizeVar=s.size+(Math.sin(frameCount*0.05+s.x)*0.5);
    ctx.fillRect(Math.round(sx),Math.round(s.y),Math.ceil(sizeVar),Math.ceil(sizeVar));
  });
  ctx.globalAlpha=1;

  // Clouds
  bgClouds.forEach(c=>{
    let cx=((c.x-cameraX*c.speed*0.25)%2400+2400)%2400;
    ctx.globalAlpha=c.density*0.5;
    ctx.fillStyle=c.color;
    let cloudParticles=3+Math.floor(c.w/40);
    for(let cp=0;cp<cloudParticles;cp++){
      let cpx=cx+(cp/cloudParticles)*c.w;
      let cpy=c.y+(Math.sin(cp+frameCount*0.01)*c.h*0.3);
      ctx.beginPath();
      ctx.ellipse(cpx,cpy,c.w/(cloudParticles*0.7),c.h*0.5,0.2,0,Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha=1;

  // Pixel grid overlay
  ctx.globalAlpha=0.02;
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=1;
  for(let gx=0;gx<GAME_W;gx+=TILE){
    ctx.beginPath();
    ctx.moveTo(gx,0);
    ctx.lineTo(gx,GAME_H);
    ctx.stroke();
  }
  for(let gy=0;gy<GAME_H;gy+=TILE){
    ctx.beginPath();
    ctx.moveTo(0,gy);
    ctx.lineTo(GAME_W,gy);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ---- DRAW PLATFORM ----
function drawPlatform(plat){
  let px=plat.x-cameraX,py=plat.y,pw=plat.w,ph=plat.h;
  if(px+pw<-10||px>GAME_W+10)return;

  if(plat.t==='grass'){
    // Dirt base
    ctx.fillStyle='#8b4513';
    ctx.fillRect(px,py+TILE,pw,ph-TILE);
    
    // Grass top with bright green
    ctx.fillStyle=COLORS.grassBright;
    ctx.fillRect(px,py,pw,TILE);
    ctx.fillStyle=COLORS.leafBright;
    for(let tx=0;tx<pw;tx+=8){ctx.fillRect(px+tx,py,6,TILE);}
    
    // Bright highlight
    ctx.fillStyle='#7dd400';
    ctx.fillRect(px,py,pw,4);
    
    // Grass blades
    ctx.fillStyle=COLORS.grassBright;
    for(let tx=4;tx<pw;tx+=10){
      ctx.fillRect(px+tx,py-4,4,8);
      ctx.fillRect(px+tx+5,py-6,3,10);
    }
    
    ctx.strokeStyle='#3a7c1f';ctx.lineWidth=2;
    ctx.strokeRect(px,py,pw,ph);
  } else if(plat.t==='brick'){
    ctx.fillStyle=COLORS.brickRed;
    ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle=COLORS.brickDark;
    for(let ry=0;ry<ph;ry+=12){ctx.fillRect(px,py+ry,pw,2);}
    for(let ry=0;ry<ph;ry+=12){
      let offset=((ry/12)%2===0)?0:16;
      for(let rx=offset;rx<pw;rx+=32){ctx.fillRect(px+rx,py+ry,2,10);}
    }
    ctx.strokeStyle='#ff8844';ctx.lineWidth=1;
    ctx.strokeRect(px,py,pw,ph);
  } else if(plat.t==='wood'){
    ctx.fillStyle=COLORS.woodBrown;
    ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#a06008';
    for(let ry=4;ry<ph;ry+=6){ctx.fillRect(px,py+ry,pw,2);}
    ctx.fillStyle='#ffcc33';
    ctx.fillRect(px,py,pw,4);
    if(pw<=70&&ph<=24){
      ctx.fillStyle='#ffe040';
      ctx.font='bold 14px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',px+pw/2,py+ph/2);
    }
    ctx.strokeStyle='#7a4400';ctx.lineWidth=1;
    ctx.strokeRect(px,py,pw,ph);
  } else if(plat.t==='stone'){
    ctx.fillStyle=COLORS.stonePrimary;
    ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#667788';
    for(let rx=0;rx<pw;rx+=20){
      for(let ry=0;ry<ph;ry+=12){ctx.fillRect(px+rx+2,py+ry+2,16,8);}
    }
    ctx.fillStyle='#ccddee';
    ctx.fillRect(px,py,pw,3);
    ctx.strokeStyle='#556677';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  } else if(plat.t==='pipe'){
    ctx.fillStyle='#0d6b0d';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle=COLORS.pipePrimary;ctx.fillRect(px+6,py,pw-12,ph);
    ctx.fillStyle='#4ef060';ctx.fillRect(px+10,py,8,ph);
    ctx.fillStyle='#0a5a0a';ctx.fillRect(px-6,py,pw+12,28);
    ctx.fillStyle='#33cc33';ctx.fillRect(px-2,py+2,pw+4,22);
    ctx.fillStyle='#77ff77';ctx.fillRect(px+4,py+4,12,16);
    ctx.strokeStyle='#053a05';ctx.lineWidth=2;ctx.strokeRect(px-6,py,pw+12,28);
  }
}

// ---- DRAW GOAL FLAG ----
function drawGoal(){
  let g=levelData.goal;
  let gx=g.x-cameraX,gy=g.y;
  let pulse=0.7+0.3*Math.sin(frameCount*0.08);
  ctx.save();
  ctx.globalAlpha=pulse*0.5;
  ctx.fillStyle='#ffdd44';
  ctx.beginPath();ctx.arc(gx+20,gy,35,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#ffff55';
  for(let i=0;i<8;i++){
    let a=i/8*Math.PI*2+frameCount*0.04;
    let r=i%2===0?20:10;
    ctx.fillRect(gx+20+Math.cos(a)*r-2,gy+Math.sin(a)*r-2,4,4);
  }
  ctx.fillStyle='#ffff99';
  ctx.beginPath();ctx.arc(gx+20,gy,10,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ---- DRAW POWERUP ----
function drawPowerup(pu){
  if(pu.collected)return;
  let px=pu.x-cameraX,py=pu.y;
  let def=POWERUPS[pu.type];
  let bob=Math.sin(frameCount*0.06+pu.x*0.01)*5;
  let glow=0.5+0.5*Math.sin(frameCount*0.1);

  ctx.save();
  ctx.globalAlpha=glow*0.6;
  ctx.fillStyle=def.glow;
  ctx.beginPath();ctx.arc(px+12,py+12+bob,25,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  ctx.fillStyle=def.color;
  ctx.fillRect(px,py+bob,24,24);
  ctx.fillStyle='#ffffff99';
  ctx.fillRect(px+2,py+bob+2,8,4);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
  ctx.strokeRect(px,py+bob,24,24);

  ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.fillText(def.icon,px+12,py+12+bob);

  ctx.restore();
}

// ---- DRAW HERO CHARACTER ----
function drawPlayer(){
  let x=Math.round(p.x-cameraX),y=Math.round(p.y);
  let f=p.facingR?1:-1;
  let blink=p.invincible>0&&Math.floor(frameCount/4)%2===0;
  if(blink){ctx.globalAlpha=0.4;}

  let walkCycle=p.onGround&&(p.vx!==0)?Math.sin(frameCount*0.3)*4:0;
  let bodyBob=p.onGround?(Math.abs(Math.sin(frameCount*0.3))*2):0;
  let ay=y+bodyBob;

  ctx.save();
  ctx.translate(x+14,0);
  ctx.scale(f,1);
  ctx.translate(-14,0);

  // Jetpack
  ctx.fillStyle='#445588';
  ctx.fillRect(6,ay+12,10,18);
  ctx.fillStyle='#6677aa';ctx.fillRect(8,ay+14,6,6);
  ctx.fillStyle='#223355';ctx.fillRect(7,ay+20,8,8);
  
  if(!p.onGround||p.jumpAnim>0){
    let tsize=4+Math.random()*6;
    ctx.fillStyle='#ff6600';ctx.fillRect(8,ay+30,5,tsize);
    ctx.fillStyle='#ffff00';ctx.fillRect(9,ay+30,3,tsize-2);
    ctx.globalAlpha=0.6;
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(10,ay+30+tsize,tsize,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Body
  ctx.fillStyle='#3366ff';
  ctx.fillRect(4,ay+14,20,18);
  ctx.fillStyle='#5588ff';
  ctx.fillRect(5,ay+15,8,8);
  ctx.fillStyle='#00ffff';
  ctx.fillRect(9,ay+17,6,6);
  ctx.fillStyle='#ffffff99';ctx.fillRect(10,ay+18,2,2);

  // Legs
  let lkick=walkCycle;
  ctx.fillStyle='#2255cc';
  ctx.fillRect(4,ay+30,8,10+lkick);
  ctx.fillRect(14,ay+30,8,10-lkick);
  ctx.fillStyle='#88bbff';
  ctx.fillRect(3,ay+38+lkick,10,6);
  ctx.fillRect(13,ay+38-lkick,10,6);
  ctx.fillStyle='#aaccff';ctx.fillRect(3,ay+38+lkick,10,2);

  // Arms
  let armSwing=walkCycle*0.8;
  ctx.fillStyle='#3366ff';
  ctx.fillRect(-2,ay+16+armSwing,6,12);
  ctx.fillRect(22,ay+16-armSwing,6,12);
  ctx.fillStyle='#aaccff';
  ctx.fillRect(-3,ay+26+armSwing,8,6);
  ctx.fillRect(21,ay+26-armSwing,8,6);

  // Head/Helmet
  ctx.fillStyle='#2255cc';
  ctx.fillRect(3,ay,22,18);
  ctx.fillStyle='#3377ee';
  ctx.fillRect(5,ay-4,18,6);
  ctx.fillRect(7,ay-6,14,4);
  ctx.fillRect(9,ay-8,10,4);
  ctx.fillStyle='#88ccff';ctx.fillRect(17,ay-12,2,8);
  
  let antBlinkColor=Math.floor(frameCount/15)%2===0?'#ff3344':'#ff7788';
  ctx.fillStyle=antBlinkColor;ctx.fillRect(15,ay-14,6,4);

  // Visor
  let visorColor=p.shield>0?'#aa88ff':'#00ffff';
  ctx.fillStyle=visorColor;
  ctx.fillRect(6,ay+4,16,9);
  ctx.fillStyle='#ffffff88';
  ctx.fillRect(7,ay+5,5,3);
  ctx.fillStyle=p.shield>0?'#dd99ff':'#77ffff';
  ctx.fillRect(6,ay+4,16,2);

  // Shield
  if(p.shield>0){
    ctx.globalAlpha=0.4+0.2*Math.sin(frameCount*0.15);
    ctx.strokeStyle='#aa88ff';ctx.lineWidth=3;
    ctx.strokeRect(-6,ay-6,40,58);
    ctx.globalAlpha=0.15;
    ctx.fillStyle='#aa88ff';ctx.fillRect(-6,ay-6,40,58);
    ctx.globalAlpha=1;
  }

  // Speed trail
  if(p.speedBoost>0){
    for(let i=1;i<=4;i++){
      ctx.globalAlpha=(0.6-i*0.12);
      ctx.fillStyle='#ffdd00';
      ctx.fillRect(-f*i*8+14,ay+10,4,20);
    }
    ctx.globalAlpha=1;
  }

  ctx.restore();
  ctx.globalAlpha=1;
  if(p.jumpAnim>0)p.jumpAnim--;
}

// ---- PHYSICS ----
function updatePlayer(){
  if(state!==STATES.PLAY)return;

  let spd=SPD*(1+(p.speedBoost>0?0.8:0));
  
  // Fixed WASD and Arrow key handling
  let moveLeft=(keys['ArrowLeft']||keys['a']||keys['A']);
  let moveRight=(keys['ArrowRight']||keys['d']||keys['D']);
  
  if(moveLeft){
    p.vx=-spd;
    p.facingR=false;
  }
  else if(moveRight){
    p.vx=spd;
    p.facingR=true;
  }
  else{
    p.vx*=0.7;
  }

  p.vy+=GRAV;
  p.x+=p.vx;
  p.y+=p.vy;
  p.invincible=Math.max(0,p.invincible-1);
  if(p.speedBoost>0)p.speedBoost--;
  if(p.shield>0)p.shield--;

  p.onGround=false;
  levelData.platforms.forEach(plat=>{
    if(rect(p.x,p.y,p.w,p.h,plat.x,plat.y,plat.w,plat.h)){
      if(p.vy>0&&p.y+p.h-p.vy<=plat.y+4){
        p.y=plat.y-p.h;p.vy=0;p.onGround=true;p.hasDoubleJump=true;
        if(plat.t==='pipe'){
          let g=levelData.goal;
          if(rect(p.x,p.y,p.w,p.h,g.x,g.y,g.w,g.h)||p.x+p.w>plat.x+6){
            nextLevel();return;
          }
        }
      }
      else if(p.vx>0&&p.x+p.w-p.vx<=plat.x){p.x=plat.x-p.w;p.vx=0;}
      else if(p.vx<0&&p.x-p.vx>=plat.x+plat.w){p.x=plat.x+plat.w;p.vx=0;}
      else if(p.vy<0){p.vy=0;}
    }
  });

  let g=levelData.goal;
  if(rect(p.x,p.y,p.w,p.h,g.x,g.y,g.w+60,g.h+60)){
    nextLevel();
  }

  powerupsInLevel.forEach(pu=>{
    if(pu.collected)return;
    if(rect(p.x,p.y,p.w,p.h,pu.x,pu.y,24,24)){
      pu.collected=true;
      let def=POWERUPS[pu.type];
      if(pu.type==='SPEED'){p.speedBoost=def.duration;}
      else if(pu.type==='JUMP'){p.hasDoubleJump=true;p.doubleJump=true;}
      else if(pu.type==='SHIELD'){p.shield=def.duration;}
      spawnParticles(pu.x+12,pu.y+12,def.color,16,5);
      spawnText(pu.x,pu.y-10,def.label+'!',def.color);
    }
  });

  if(p.y>GAME_H+60){
    if(p.shield>0){p.shield=0;p.invincible=80;p.y=300;p.vy=-8;spawnText(p.x,p.y-20,'SHIELD SAVED!','#aa88ff');return;}
    p.lives--;
    spawnParticles(p.x+14,p.y-20,'#ff3b3b',20,6);
    if(p.lives<=0){state=STATES.GAMEOVER;}
    else{resetPlayer();}
  }

  cameraX=clamp(p.x-200,0,3000);
}

function nextLevel(){
  spawnParticles(p.x+14,p.y,'#ffff44',30,6);
  currentLevel++;
  if(currentLevel>=LEVEL_BASES.length){state=STATES.WIN;}
  else{loadLevel(currentLevel);}
}

// ---- INPUT ----
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  
  if(state===STATES.MENU&&(e.key==='Enter'||e.key===' ')){
    gameResetCount++;
    currentLevel=0;p.lives=3;
    loadLevel(0);
    state=STATES.PLAY;
  }
  if(state===STATES.GAMEOVER&&e.key==='Enter'){
    gameResetCount++;
    state=STATES.MENU;
  }
  if(state===STATES.WIN&&e.key==='Enter'){
    gameResetCount++;
    state=STATES.MENU;
  }
  if(state===STATES.PLAY){
    // Fixed jump input with proper key codes
    if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      if(p.onGround){
        p.vy=JUMP;
        p.onGround=false;
        p.jumpAnim=8;
      }
      else if(p.hasDoubleJump&&p.doubleJump){
        p.vy=JUMP*0.85;
        p.doubleJump=false;
        p.jumpAnim=8;
        spawnParticles(p.x+14,p.y+p.h,'#00ddff',10,3);
      }
    }
    if(e.key==='Escape'){
      gameResetCount++;
      state=STATES.MENU;
      currentLevel=0;
    }
  }
  
  e.preventDefault();
});

document.addEventListener('keyup',e=>{
  keys[e.key]=false;
});

// ---- HUD ----
function drawHUD(){
  let padding=16;
  
  // Lives - Top Left
  for(let i=0;i<3;i++){
    let alive=i<p.lives;
    ctx.fillStyle=alive?COLORS.heartRed:'#444';
    let hx=padding+i*26,hy=padding;
    ctx.fillRect(hx+3,hy,5,3);ctx.fillRect(hx+10,hy,5,3);
    ctx.fillRect(hx,hy+3,16,5);ctx.fillRect(hx+2,hy+8,12,3);
    ctx.fillRect(hx+3,hy+11,10,3);ctx.fillRect(hx+5,hy+14,6,3);
    ctx.fillRect(hx+6,hy+17,4,3);
    if(alive){
      ctx.fillStyle='#ff6677';ctx.fillRect(hx+4,hy+1,4,2);
    }
  }

  // Level - Top Center
  let levelText='LEVEL '+((currentLevel+1));
  drawPixelText(levelText,GAME_W/2,padding+4,18,COLORS.textGold,'center');

  // Powerups - Top Right
  let icons=[];
  if(p.speedBoost>0)icons.push({label:'SPD',color:'#ffcc00',bar:p.speedBoost/POWERUPS.SPEED.duration});
  if(p.shield>0)icons.push({label:'SHD',color:'#aa88ff',bar:p.shield/POWERUPS.SHIELD.duration});
  if(p.hasDoubleJump&&p.doubleJump)icons.push({label:'DBL',color:'#00ffcc',bar:1});
  
  let powerupStartX=GAME_W-padding;
  icons.forEach((ic,i)=>{
    let boxW=50;
    let boxH=26;
    let ix=powerupStartX-(icons.length-i)*boxW-(icons.length-i-1)*6;
    let iy=padding;
    
    ctx.fillStyle='#000a';
    ctx.fillRect(ix-3,iy-2,boxW+6,boxH+4);
    ctx.strokeStyle=ic.color;
    ctx.lineWidth=1;
    ctx.strokeRect(ix,iy,boxW,boxH);
    
    ctx.fillStyle=ic.color;
    ctx.fillRect(ix+2,iy+2,boxW-4,6);
    ctx.fillStyle='#333';
    ctx.fillRect(ix+2+(boxW-4)*ic.bar,iy+2,(boxW-4)*(1-ic.bar),6);
    ctx.strokeStyle=ic.color;
    ctx.lineWidth=1;
    ctx.strokeRect(ix+2,iy+2,boxW-4,6);
    
    drawPixelText(ic.label,ix+4,iy+10,11,ic.color,'left');
  });
}

// ---- PARTICLES & TEXT UPDATE ----
function updateParticles(){
  particles=particles.filter(pt=>{
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life-=0.03;
    if(pt.life>0){
      ctx.globalAlpha=pt.life;
      ctx.fillStyle=pt.color;
      ctx.fillRect(Math.round(pt.x-cameraX),Math.round(pt.y),Math.ceil(pt.size),Math.ceil(pt.size));
      ctx.globalAlpha=1;
    }
    return pt.life>0;
  });
  floatingTexts=floatingTexts.filter(ft=>{
    ft.y+=ft.vy;ft.life-=0.018;
    if(ft.life>0){
      ctx.globalAlpha=ft.life;
      drawPixelText(ft.text,ft.x-cameraX+14,ft.y,14,ft.color,'center');
      ctx.globalAlpha=1;
    }
    return ft.life>0;
  });
}

// ---- MENU ----
function drawMenu(){
  drawBackground();
  
  let centerY=GAME_H/2;
  let pulse=0.85+0.15*Math.sin(frameCount*0.05);
  
  ctx.save();
  ctx.translate(GAME_W/2,centerY-80);
  ctx.scale(pulse,pulse);
  
  ctx.fillStyle='#000d';
  ctx.fillRect(-200,-50,400,100);
  ctx.strokeStyle='#ffa500';
  ctx.lineWidth=3;
  ctx.strokeRect(-200,-50,400,100);
  ctx.strokeStyle='#ff6b35';
  ctx.lineWidth=1;
  ctx.strokeRect(-196,-46,392,92);
  
  drawPixelText('SUPER COLONZO',-170,-28,22,COLORS.textGold,'left');
  drawPixelText('WORLD',-170,4,22,COLORS.textGold,'left');
  drawPixelText('ADVENTURE',-70,28,16,'#ff6b35','left');
  
  ctx.restore();

  let instructY=centerY+50;
  drawPixelText('[ ENTER ] to Start',GAME_W/2,instructY,16,'#7dd400','center');
  drawPixelText('ARROWS/WASD: Move   SPACE/W: Jump',GAME_W/2,instructY+24,13,'#87ceeb','center');
  drawPixelText('Power-ups spawn randomly each reset!',GAME_W/2,instructY+42,13,COLORS.textCyan,'center');
  drawPixelText('Press ESC to return to menu',GAME_W/2,instructY+60,12,'#87ceeb','center');

  let pvs=Object.entries(POWERUPS);
  let legendY=GAME_H-56;
  let legendWidth=pvs.length*(68)+((pvs.length-1)*8);
  let legendStartX=GAME_W/2-legendWidth/2;
  
  pvs.forEach(([k,def],i)=>{
    let lx=legendStartX+i*(68+8);
    let ly=legendY;
    
    ctx.fillStyle='#000a';
    ctx.fillRect(lx-4,ly-4,68+8,50+8);
    ctx.strokeStyle=def.color;
    ctx.lineWidth=1;
    ctx.strokeRect(lx,ly,68,50);
    
    ctx.fillStyle=def.color;
    ctx.fillRect(lx+6,ly+6,18,18);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=1;
    ctx.strokeRect(lx+6,ly+6,18,18);
    ctx.font='14px serif';
    ctx.fillStyle='#fff';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(def.icon,lx+15,ly+15);
    
    drawPixelText(def.label,lx+26,ly+8,12,def.color,'left');
  });
}

// ---- GAMEOVER ----
function drawGameOver(){
  drawBackground();
  ctx.fillStyle='#000b';
  ctx.fillRect(0,0,GAME_W,GAME_H);
  
  let centerY=GAME_H/2;
  ctx.fillStyle='#ff3b3b';
  ctx.fillRect(GAME_W/2-160,centerY-70,320,110);
  ctx.strokeStyle='#ff6b6b';
  ctx.lineWidth=2;
  ctx.strokeRect(GAME_W/2-160,centerY-70,320,110);
  
  drawPixelText('GAME OVER',GAME_W/2,centerY-45,36,'#fff','center');
  drawPixelText('[ ENTER ] to return to Menu',GAME_W/2,centerY+25,15,'#ffaaaa','center');
}

// ---- WIN ----
function drawWin(){
  drawBackground();
  
  for(let i=0;i<20;i++){
    ctx.fillStyle=['#ffff00','#ff6b35','#00ffff','#7dd400'][i%4];
    ctx.fillRect(
      (Math.sin(frameCount*0.05+i*1.3)*160+GAME_W/2+i*16)%GAME_W,
      (frameCount*1.5+i*40)%GAME_H,7,7
    );
  }
  
  let centerY=GAME_H/2;
  ctx.fillStyle='#000b';
  ctx.fillRect(GAME_W/2-190,centerY-90,380,150);
  ctx.strokeStyle=COLORS.textGold;
  ctx.lineWidth=2;
  ctx.strokeRect(GAME_W/2-190,centerY-90,380,150);
  
  drawPixelText('YOU WIN!',GAME_W/2,centerY-55,40,COLORS.textGold,'center');
  drawPixelText('MISSION COMPLETE',GAME_W/2,centerY-8,20,COLORS.textCyan,'center');
  drawPixelText('[ ENTER ] for Menu',GAME_W/2,centerY+40,16,'#fff','center');
}

// ---- MAIN LOOP ----
function loop(){
  ctx.clearRect(0,0,GAME_W,GAME_H);
  frameCount++;

  if(state===STATES.MENU){drawMenu();}
  else if(state===STATES.GAMEOVER){drawGameOver();}
  else if(state===STATES.WIN){drawWin();}
  else{
    updatePlayer();
    drawBackground();
    levelData.platforms.forEach(pl=>drawPlatform(pl));
    powerupsInLevel.forEach(pu=>drawPowerup(pu));
    drawGoal();
    drawPlayer();
    updateParticles();
    drawHUD();
  }

  requestAnimationFrame(loop);
}

loop();
</script>
